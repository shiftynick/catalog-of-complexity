name: validate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Validate registry + taxonomy + schemas
        run: uv run coc validate

      - name: Lint skill manifests
        run: uv run python scripts/lint_skills.py

      - name: Run QC evals and goldens
        run: uv run coc eval
