name: system-classes
description: >
  Sub-categories of systems spanning one or more domains. Classes are a
  secondary classification axis: a single system may be tagged with multiple
  classes. Keep the list small at first; expand when >5 systems cluster around
  a concept not yet represented.
version: 0.1.0
items:
  - slug: forest-biome
    label: Forest biome
    description: Large-scale terrestrial ecological system dominated by trees.
  - slug: ocean-circulation-cell
    label: Ocean circulation cell
    description: Basin- or gyre-scale pattern of ocean currents driven by wind, temperature, and salinity.
  - slug: urban-metabolism
    label: Urban metabolism
    description: >
      A city treated as a system of material and energy flows, coupling human,
      technological, and ecological subsystems.
  - slug: distributed-software-system
    label: Distributed software system
    description: >
      Network of computational processes coordinating over messages to
      provide a service, subject to partial failures and consistency tradeoffs.
  - slug: artificial-neural-network
    label: Artificial neural network
    description: Parameterized differentiable model trained via gradient descent.
  - slug: central-nervous-system
    label: Central nervous system
    description: Neural tissue coordinating perception, cognition, and motor control in animals.
  - slug: supply-chain
    label: Supply chain
    description: >
      Multi-organization network of suppliers, transforms, and distributors
      converting raw inputs to end-consumer goods.
  - slug: market-exchange
    label: Market exchange
    description: >
      Venue where dispersed participants transact, with prices emerging from
      their aggregate actions.
  - slug: bureaucratic-organization
    label: Bureaucratic organization
    description: Formal hierarchical structure with rule-based decision authority.
  - slug: power-grid
    label: Power grid
    description: >
      Synchronized electricity generation, transmission, and distribution
      network with real-time supply-demand balance requirements.
  - slug: river-network
    label: River network
    description: Dendritic hydrological system draining a terrestrial area into a common outlet.
  - slug: immune-system
    label: Immune system
    description: Cellular and molecular subsystem that discriminates self from non-self and responds to threats.
  - slug: multicellular-organism
    label: Multicellular organism
    description: Coordinated colony of differentiated cells with a shared genome.
  - slug: microbiome
    label: Microbiome
    description: Community of microorganisms occupying a defined environment or host.
  - slug: protocol-stack
    label: Protocol stack
    description: Layered set of communication protocols enabling interoperable data exchange.
  - slug: language-community
    label: Language community
    description: Population of speakers sharing a linguistic code, with ongoing variation and change.
  - slug: belief-network
    label: Belief network
    description: Structured collection of propositions held by a group, with inferential and social coupling.
  - slug: transportation-network
    label: Transportation network
    description: Infrastructure plus flow system moving people or goods between nodes.
  - slug: unicellular-organism
    label: Unicellular organism
    description: >
      Single-celled organism — prokaryote (bacteria, archaea) or single-celled
      eukaryote (yeast, protist) — whose complete life cycle is carried out by
      one cell. Distinct from `multicellular-organism` (differentiated cells
      with shared genome) and from `microbiome` (a community of many
      organisms occupying a niche).
    references:
      - Madigan, M.T. et al. (2021) Brock Biology of Microorganisms, 16th ed. Pearson. ISBN 978-0134874401.
      - Woese, C.R. (1987) Bacterial evolution. Microbiological Reviews 51(2):221-271.
  - slug: metabolic-network
    label: Metabolic network
    description: >
      Intracellular graph of biochemical reactions — metabolites as nodes,
      enzyme-catalyzed conversions as edges — that collectively realize a
      cell's energy, biosynthesis, and regulatory functions. Distinct from
      `immune-system` (organism-level defense subsystem) and from
      `unicellular-organism` (the whole cell as a unit) by being a
      within-cell functional network rather than an organism or community.
    references:
      - Jeong, H., Tombor, B., Albert, R., Oltvai, Z.N., Barabási, A.-L. (2000) The large-scale organization of metabolic networks. Nature 407:651-654. doi:10.1038/35036627.
      - Palsson, B.Ø. (2015) Systems Biology - Constraint-based Reconstruction and Analysis. Cambridge University Press. ISBN 978-1107038851.
  - slug: superorganism
    label: Superorganism
    description: >
      Eusocial colony (e.g. social insects) or clonal colony whose members
      exhibit reproductive division of labor and are treated as the unit of
      selection. Distinct from `multicellular-organism` (differentiated cells
      rather than differentiated individuals) and from `microbiome` (diverse
      community without unified reproductive specialization).
    references:
      - Hölldobler, B. & Wilson, E.O. (2009) The Superorganism - The Beauty, Elegance, and Strangeness of Insect Societies. W. W. Norton. ISBN 978-0393067040.
      - Wheeler, W.M. (1911) The ant-colony as an organism. Journal of Morphology 22(2):307-325.
  - slug: atomic-system
    label: Atomic system
    description: >
      Bound system of one nucleus and its electrons (neutral atom or atomic
      ion), whose stationary states and transitions are governed by the
      electromagnetic interaction plus spin-orbit and relativistic corrections.
      The canonical unit of the periodic table and the smallest system
      exhibiting discrete quantum energy levels that realize chemical identity.
      Distinct from `molecular-system` (once added: nuclei bonded into a
      multi-atom structure via shared electronic states) and from
      `chemical-reaction-network` (once added: population-level kinetics across
      many molecular species). Also distinct from physical-domain classes like
      `ocean-circulation-cell` and `river-network`, which describe macroscale
      classical fluid/transport systems rather than bound few-body
      electromagnetic systems.
    references:
      - Bransden, B.H. & Joachain, C.J. (2003) Physics of Atoms and Molecules, 2nd ed. Pearson. ISBN 978-0582356924.
      - Foot, C.J. (2005) Atomic Physics. Oxford University Press. ISBN 978-0198506966.
      - NIST Atomic Spectra Database (2024). doi:10.18434/T4W30F.
  - slug: molecular-system
    label: Molecular system
    description: >
      Bound assembly of two or more atoms held together by chemical bonds
      (covalent, ionic, metallic, hydrogen, or van der Waals), whose
      stationary states are governed by the coupled electronic and nuclear
      Schrödinger problem (Born–Oppenheimer separation in most practical
      treatments). Spans diatomics (H2, N2), polyatomic small molecules
      (H2O, CO2), and macromolecules (proteins, polymers) when treated as
      a single bound object rather than as a population of species.
      Distinct from `atomic-system` (single nucleus plus electrons, no
      interatomic bonds) and from `chemical-reaction-network` (once added:
      population-level kinetics across many molecular species rather than
      a single bound assembly). Also distinct from biological classes like
      `multicellular-organism`, where molecules are components rather than
      the system-of-interest.
    references:
      - Atkins, P. & Friedman, R. (2011) Molecular Quantum Mechanics, 5th ed. Oxford University Press. ISBN 978-0199541423.
      - McQuarrie, D.A. (2007) Quantum Chemistry, 2nd ed. University Science Books. ISBN 978-1891389504.
      - Szabo, A. & Ostlund, N.S. (1996) Modern Quantum Chemistry. Dover. ISBN 978-0486691862.
  - slug: chemical-reaction-network
    label: Chemical reaction network
    description: >
      Population-level system of chemical species coupled by elementary
      reactions, described by a stoichiometric matrix and a rate law
      (mass-action, Michaelis-Menten, or other). Dynamics are typically
      modeled as ODEs in the deterministic limit or as continuous-time
      Markov chains in the stochastic limit (chemical master equation /
      Gillespie simulation). Canonical examples include the
      Belousov-Zhabotinsky oscillator, the Brusselator, combustion
      kinetics, atmospheric photochemistry, and in-silico CRN models of
      gene regulation. Distinct from `atomic-system` (single nucleus plus
      electrons, no interatomic bonds) and from `molecular-system` (a
      single bound multi-atom object treated as the system-of-interest
      rather than a population of species). Distinct from
      `metabolic-network`, which is a biological-domain special case of a
      CRN restricted to enzyme-catalyzed intracellular biochemistry with
      additional cellular context (compartments, regulation, cofactor
      pools).
    references:
      - Érdi, P. & Tóth, J. (1989) Mathematical Models of Chemical Reactions. Princeton University Press / Manchester University Press. ISBN 978-0691085326.
      - Feinberg, M. (2019) Foundations of Chemical Reaction Network Theory. Springer Applied Mathematical Sciences vol. 202. ISBN 978-3030038571.
      - Gillespie, D.T. (1977) Exact stochastic simulation of coupled chemical reactions. Journal of Physical Chemistry 81(25):2340-2361. doi:10.1021/j100540a008.
