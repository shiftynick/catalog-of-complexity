# Project phase switch — sweep autorun model.
#
# Read by prompts/autonomous-run.md and src/coc/phase.py at the start
# of every cron tick. Edit `current` and commit to change behavior;
# alternatively, leave `auto_advance: true` and the autorun will flip
# `current` automatically when each phase's worklist drains to zero.
#
# Phase semantics (sequential left-to-right; one primary task type each):
#
#   system-profiling   — walk every bootstrap-stub system (P0-first then
#                        round-robin across system-domains within each
#                        priority bucket); upgrade each to status:
#                        candidate via profile-system. Done when no
#                        system has status: bootstrap-stub.
#
#   metric-definition  — walk every bootstrap-stub metric (L2 first then
#                        L1 / L0 / L3+); upgrade each to status:
#                        proposed (or canonical) via define-metrics.
#                        Done when no metric has status: bootstrap-stub.
#
#   matrix-fill        — walk every candidate-or-profiled system and run
#                        fill-system-metrics on it (one task per system,
#                        all applicable metrics in one integrated pass).
#                        Open-ended; advanced manually to `analysis`
#                        when matrix density justifies cross-system
#                        analysis.
#
#   analysis           — analyze-archetypes / clustering / hypothesis
#                        generation. Human-promoted only; not
#                        auto-dispatched by the worklist resolver.
#
# Each cron tick also runs side channels (acquire-source, review-records,
# apply-retros) opportunistically with phase-specific caps.
current: system-profiling

# Auto-advance: flip `current` when the active phase's completion
# predicate is satisfied. Disabled if false (manual edits only).
auto_advance: true

# Mapping from phase to the primary task type that fires under it.
# autonomous-run.md uses this to dispatch tasks via the worklist
# resolver. `analysis` is null because analyze-archetypes is
# human-promoted, not auto-dispatched.
phase_to_task_type:
  system-profiling:  profile-system
  metric-definition: define-metrics
  matrix-fill:       fill-system-metrics
  analysis:          null

# Per-tick side-channel caps. Side channels run alongside the active
# phase's primary type and are bounded so they can't flood. The
# matrix-fill phase raises acquire-source to 10 because
# fill-system-metrics emits many acquire-source manifests as it
# encounters cited prefixed refs.
side_channels:
  system-profiling:
    acquire-source: 3
    review-records: 1
  metric-definition:
    acquire-source: 5
    review-records: 1
  matrix-fill:
    acquire-source: 10
    review-records: 1
  analysis:
    acquire-source: 3
    review-records: 1

# Auto-advance triggers per phase. `next: null` means terminal /
# human-advanced. Predicates in `when` map to functions in src/coc/phase.py:
#   zero_systems_at_bootstrap_stub
#   zero_metrics_at_bootstrap_stub
#   never
phase_advance:
  system-profiling:
    next: metric-definition
    when: zero_systems_at_bootstrap_stub
  metric-definition:
    next: matrix-fill
    when: zero_metrics_at_bootstrap_stub
  matrix-fill:
    next: null
    when: never
  analysis:
    next: null
    when: never

# Ordering policy for the worklist resolver. Documented here so curators
# can see and override; the resolver in src/coc/worklist.py implements
# these policies directly.
worklist_ordering:
  system_phases:
    primary: priority         # P0 -> P1 -> P2 -> P3 -> C -> unset
    secondary: domain-interleave  # round-robin across system-domains
  metric_phase:
    primary: maturity-level   # L2 -> L1 -> L0 -> L3 -> L4 -> L5
    secondary: family
    tertiary: slug
