default_metric_status: bootstrap-stub
default_system_status: bootstrap-stub
description: 'Long-tail catalog seed: thin-stub entries imported from docs/framework/02-candidate-systems-catalog.md
  §3-25 (systems) and docs/framework/03-metric-ontology.md §4-21 (metrics). All entries
  carry status: bootstrap-stub. Systems have minimum-required boundary/components/interaction_types/scales
  placeholders. Metrics have skeleton applicability + family-default estimation_methods
  awaiting rubric upgrade via define-metrics. Generated by scripts/build_seed_v2.py
  from scripts/_seed_v2_data.py + scripts/_seed_v2_metrics_data.py — do not hand-edit;
  edit the source data and re-run the build.'
metrics:
