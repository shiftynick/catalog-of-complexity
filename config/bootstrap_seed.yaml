  - slug: linear-supply-chain
    name: Linear supply chain
    priority: C
    domain: economic
    classes: [linear-supply-chain]
    system_kind: boundary_case
    substrate: sequential conversion pipeline with no redundancy
    origin: designed
    boundary_clarity: crisp
    primary_function: sequential stepwise transformation from raw input to end product
    lifecycle_stage: maturity
    summary: |
      A non-redundant, strictly sequential conversion pipeline —
      A -> B -> C -> D — without alternative routing, redundancy, or
      adaptive capacity. Boundary case for the supply-chain class;
      establishes the baseline against which networked supply chains
      should be compared.
    boundary:
      type: functional
      description: A defined sequence of stages from raw material to finished good, with one supplier and one buyer at each stage.
    components:
      - upstream raw-material source
      - sequential conversion stages
      - downstream consumer
      - inventory buffers between stages (sometimes absent)
    interaction_types:
      - one-stage-to-next material flow
      - payment flow upstream
      - schedule and demand information passed upstream
    scales:
      spatial:
        - regional or global, depending on instance
      temporal:
        - cycle time ~10^5 to 10^7 s (days to months)
    main_feedbacks:
      - inventory buffer dynamics (bullwhip effect even in linear chains)
    dominant_constraints:
      - throughput limited by slowest stage
      - any single-stage failure breaks the chain
    emergent_properties:
      - bullwhip effect (demand-variation amplification upstream)
    failure_modes:
      - single-stage disruption halts entire chain
      - bullwhip-driven over- and under-stocking
    canonical_examples:
      - {name: "Automotive Tier-1-2-3 supplier sequence (idealized)", note: "Pedagogical baseline; real automotive chains are networks, not lines."}
      - {name: "Textbook beer-game supply chain", note: "Canonical operations-management teaching example illustrating bullwhip."}
      - {name: "Single-source pharmaceutical API supply chain", note: "Real-world fragility example; canonical case for critical-supply-chain risk."}

