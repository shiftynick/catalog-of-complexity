    classes: [power-grid]
    system_kind: class
    substrate: synchronous AC generators + transmission + distribution + loads
    origin: designed
    boundary_clarity: crisp
    primary_function: real-time generation-load balancing of electrical power
    lifecycle_stage: maturity
    summary: |
      Synchronized electricity generation, transmission, and
      distribution network with real-time supply-demand balance
      requirements. Canonical example of tight-coupling, cascade-prone
      infrastructure; subject of network-resilience research and the
      classic blackout-cascade literature.
    boundary:
      type: spatial
      description: All electrically interconnected generators, transmission lines, transformers, and consumers within a single synchronous frequency-controlled region.
    components:
      - generators (thermal, hydro, nuclear, wind, solar)
      - transmission lines (high-voltage AC and DC)
      - transformers and substations
      - distribution network (medium- and low-voltage)
      - loads (industrial, commercial, residential)
      - control room / SCADA system
      - reactive power and voltage support equipment
    interaction_types:
      - power flow on transmission lines (subject to Kirchhoff's laws)
      - automatic generation control
      - protective relaying (rapid disconnection of faults)
      - voltage and frequency regulation
      - market dispatch (in deregulated grids)
    scales:
      spatial:
        - distribution feeder ~10^3 m
        - transmission line ~10^5 m
        - synchronous interconnection ~10^6 to 10^7 m (continental)
      temporal:
        - electromagnetic transient ~10^-6 s
        - frequency excursion ~10^0 s
        - dispatch cycle ~10^2 to 10^3 s
        - capacity planning ~10^9 s (decades)
    main_feedbacks:
      - automatic generation control responding to frequency deviation
      - market price feedback (in deregulated markets)
      - investment-cycle feedback responding to capacity margins
      - protective relay cascades
    dominant_constraints:
      - real-time generation = load (no large-scale storage at most-needed timescales)
      - thermal limits on transmission lines
      - voltage stability constraints
      - N-1 reliability standard
    emergent_properties:
      - synchronous frequency lock across the interconnection
      - cascade failure modes
      - market price volatility
    failure_modes:
      - cascade blackout (line trips trigger overloads on parallel paths)
      - voltage collapse
      - frequency-deviation islanding
      - cyber-attack (Stuxnet-class)
      - extreme-weather widespread outages
    canonical_examples:
      - {name: "Eastern Interconnection (USA)", note: "Largest synchronous grid; canonical large-scale power-grid case."}
      - {name: "Texas ERCOT grid", note: "Canonical example of vulnerability to extreme cold (Feb 2021 failure)."}
      - {name: "European synchronous grid", note: "Canonical multi-national interconnection."}

  - slug: internet
    name: The Internet
    priority: P0
    domain: technological
    classes: [internet-system, communication-network, protocol-stack]
    system_kind: class
    substrate: TCP/IP packet-switched internetwork
    origin: designed
    boundary_clarity: fuzzy
    primary_function: planet-scale packet-switched data transport
    lifecycle_stage: maturity
    summary: |
      The planet-scale interconnected packet-switched network of
      networks. Substrate of the World Wide Web, email, video
      streaming, real-time communication, and most contemporary
      digital infrastructure. Architectural exemplar of layered
      protocol design (the OSI / TCP/IP stack) and decentralized
      routing (BGP).
    boundary:
      type: functional
      description: All hosts and routers participating in the BGP-routed global IPv4/IPv6 address space; boundary is functional (whether reachable via the global routing table) rather than ownership-based.
    components:
      - hosts (end devices, ~10^10+)
      - routers (autonomous-system-internal and inter-AS)
      - autonomous systems (~10^5 globally)
      - DNS infrastructure
      - submarine and terrestrial cable infrastructure
      - data centers
      - protocols (IP, TCP, UDP, BGP, DNS, TLS, HTTP/HTTPS, etc.)
    interaction_types:
      - packet routing (BGP between ASes; OSPF/IS-IS within ASes)
      - DNS name resolution
      - TCP / TLS connection establishment
      - peer / transit / customer business relationships among ASes
      - distributed denial-of-service attacks and defenses
    scales:
      spatial:
        - device ~10^-1 m
        - data center ~10^2 m
        - submarine cable ~10^7 m
        - global ~10^7 m
      temporal:
        - packet RTT ~10^-3 to 10^-1 s
        - DNS TTL ~10^2 to 10^4 s
        - BGP convergence ~10^1 to 10^2 s
        - infrastructure investment ~10^9 s
    main_feedbacks:
      - congestion control (TCP's AIMD)
      - BGP route propagation and policy convergence
      - economics of peering and transit driving topology
      - investment responding to traffic growth
    dominant_constraints:
      - speed of light (latency floor)
      - bandwidth limits on physical media
      - IPv4 address exhaustion (driving NAT and IPv6)
      - DNS root authority and ICANN governance
    emergent_properties:
      - power-law AS topology
      - rich-club connectivity among large transits
      - end-to-end principle (intelligence at edges)
      - resilience to random failures, vulnerability to targeted attacks
    failure_modes:
      - BGP route hijacking and leaks
      - DDoS attacks
      - submarine cable cuts
      - DNS infrastructure failures
      - regional fragmentation (splinternet)
    canonical_examples:
      - {name: "Public Internet (BGP-routed IPv4/IPv6)", note: "The reference instance."}
      - {name: "Tor network", note: "Canonical alternative routing overlay."}
      - {name: "Tier-1 ISP backbone (e.g. NTT, Telia)", note: "Canonical AS-level component."}

