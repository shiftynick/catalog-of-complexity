      ontology §4.
    estimation_methods:
      - direct-enumeration
      - expert-estimate
    applicability:
      requires:
        - identifiable-component-hierarchy
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: component-diversity
    name: Component diversity
    family: composition
    value_type: continuous
    unit: shannon-bits-or-effective-types
    directionality: context-dependent
    scale_level: micro
    maturity_level: L1
    description: |
      Heterogeneity of components by type, measured as effective number
      of types (exp(Shannon entropy)) or as a richness count weighted
      by abundance. From metric ontology §5.
    estimation_methods:
      - direct-computation
      - expert-estimate
    applicability:
      requires:
        - component-type-classification
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: network-modularity
    name: Network modularity
    family: topology
    value_type: continuous
    unit: unitless
    directionality: context-dependent
    scale_level: meso
    maturity_level: L2
    description: |
      Degree to which a graph representation of a system partitions into
      internally dense, externally sparse communities. Computed on a
      chosen interaction graph (trophic, citation, transactional, etc.)
      per a stated definition (Newman-Girvan most common).
    estimation_methods:
      - direct-computation
      - inferred-network
    applicability:
      requires:
        - explicit_graph_representation
      excludes:
        - systems_without_interaction_model
    normalization:
      strategy: raw-and-zscore
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: characteristic-timescale
    name: Characteristic timescale
    family: dynamics
    value_type: continuous
    unit: seconds
    directionality: context-dependent
    scale_level: macro
    maturity_level: L1
    description: |
      Typical update, reaction, or turnover time over which the system's
      state changes meaningfully. Order-of-magnitude estimate is
      typically sufficient. From metric ontology §4.
    estimation_methods:
      - direct-measurement
      - derived-from-process-rates
      - expert-estimate
    applicability:
      requires:
        - identifiable-state-transitions
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: shannon-entropy
    name: Shannon entropy
    family: information
    value_type: continuous
    unit: bits
    directionality: context-dependent
    scale_level: multi-scale
    maturity_level: L2
    description: |
      Uncertainty or diversity over a probability distribution describing
      the system's state. Computed on the appropriate state-space
      partition for the system class. From metric ontology §10.
    estimation_methods:
      - direct-computation
      - estimator-from-empirical-frequencies
    applicability:
      requires:
        - state-space-partition
        - frequencies-or-probabilities
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: feedback-loop-count
    name: Feedback loop count
    family: feedback-adaptation
    value_type: discrete
    unit: loops
    directionality: context-dependent
    scale_level: meso
    maturity_level: L1
    description: |
      Number of identified positive and negative feedback loops in the
      system's causal or process diagram. Often expressed separately as
      `positive_feedback_count` and `negative_feedback_count`. From
      metric ontology §9.
    estimation_methods:
      - direct-enumeration
      - causal-loop-diagram-extraction
    applicability:
      requires:
        - causal-or-process-diagram
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: energy-throughput
    name: Energy throughput
    family: throughput
    value_type: continuous
    unit: watts
    directionality: context-dependent
    scale_level: macro
    maturity_level: L2
    description: |
      Rate at which energy flows through the system to maintain
      function — Chaisson's energy-rate density when normalized by
      mass. From metric ontology §12.
    estimation_methods:
      - direct-measurement
      - derived-from-energy-balance
    applicability:
      requires:
        - identifiable-energy-input
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: recovery-time
    name: Recovery time
    family: resilience
    value_type: continuous
    unit: seconds
    directionality: less-is-better
    scale_level: macro
    maturity_level: L1
    description: |
      Time required for the system to return to its pre-disturbance
      functional state after a defined perturbation. The disturbance
      magnitude and the criterion for "recovered" must be specified.
      From metric ontology §14.
    estimation_methods:
      - direct-measurement
      - derived-from-recovery-curve
      - expert-estimate
    applicability:
      requires:
        - defined-disturbance-and-recovery-criterion
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: causal-density
    name: Causal density
    family: causality
    value_type: continuous
    unit: unitless
    directionality: context-dependent
    scale_level: meso
    maturity_level: L1
    description: |
      Fraction of all possible causal links among components for which
      empirical or modeled evidence supports a causal connection.
      Distinct from network density (which counts any edge); here only
      causal edges count. From metric ontology §11.
    estimation_methods:
      - direct-computation
      - causal-discovery-algorithm
      - expert-estimate
    applicability:
      requires:
        - components-and-candidate-causal-links
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: constraint-tightness
    name: Constraint tightness
    family: constraints
    value_type: ordinal
    unit: null
    directionality: context-dependent
    scale_level: macro
    maturity_level: L0
    description: |
      Qualitative score of how close the system operates to its binding
      constraints. 0 = fully slack; 5 = saturated against binding
      constraints. From metric ontology §13.
    estimation_methods:
      - expert-estimate
      - derived-from-utilization-data
    applicability:
      requires:
        - identifiable-binding-constraints
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: control-centralization
    name: Control centralization
    family: governance
    value_type: continuous
    unit: unitless
    directionality: context-dependent
    scale_level: macro
    maturity_level: L1
    description: |
      Concentration of decision authority across the system's
      components. Often computed as a Gini coefficient or as a
      Herfindahl-Hirschman index over decision-power shares. From
      metric ontology §16.
    estimation_methods:
      - direct-computation
      - expert-estimate
    applicability:
      requires:
        - identifiable-decision-loci
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: environmental-volatility
    name: Environmental volatility
    family: environment
    value_type: continuous
    unit: relative-stdev
    directionality: context-dependent
    scale_level: macro
    maturity_level: L1
    description: |
      Rate of change of the system's environment, typically expressed
      as a relative standard deviation of relevant environmental
      variables over the system's characteristic timescale. From metric
      ontology §17.
    estimation_methods:
      - direct-measurement
      - derived-from-time-series
    applicability:
      requires:
        - identified-environmental-driver
        - time-series-data
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: throughput-rate
    name: Throughput rate (function)
    family: function-performance
    value_type: continuous
    unit: domain-specific
    directionality: more-is-better
    scale_level: macro
    maturity_level: L1
    description: |
      Domain-specific rate at which the system produces its primary
      output (transactions per second, papers per year, packets per
      second, etc.). Distinct from `energy-throughput` by being about
      *output*, not *energy flow*. From metric ontology §18.
    estimation_methods:
      - direct-measurement
    applicability:
      requires:
        - defined-primary-output
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: dominant-failure-mode
    name: Dominant failure mode
    family: failure-mode
    value_type: categorical
    unit: null
    directionality: neither
    scale_level: macro
    maturity_level: L0
    description: |
      Categorical tag identifying the system's most-likely or
      historically-most-common failure mode, drawn from the failure-mode
      vocabulary in metric ontology §19 (cascade, fragmentation,
      capture, lock-in, senescence, runaway-feedback, etc.).
    estimation_methods:
      - expert-estimate
      - derived-from-historical-record
    applicability: {}
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: transformation-potential
    name: Transformation potential
    family: potentials
    value_type: ordinal
    unit: null
    directionality: context-dependent
    scale_level: macro
    maturity_level: L0
    description: |
      Qualitative ordinal score of the system's capacity to become a
      different viable system without ceasing to function. 0 = locked-in;
      5 = highly transformable. Distinct from `recovery-time` (returning
      to same state) and from `evolvability` (incremental novelty). From
      metric ontology §20.
    estimation_methods:
      - expert-estimate
    applicability: {}
    evidence_requirements:
      minimum_source_count: 1
      review_required: true

  - slug: nearest-neighbor-system
    name: Nearest-neighbor system
    family: comparative
    value_type: categorical
    unit: null
    directionality: neither
    scale_level: macro
    maturity_level: L0
    description: |
      Most similar other system in the catalog by metric profile —
      effectively a string field naming a sys-* id. Computed downstream
      after enough metric values exist to support similarity. From metric
      ontology §21.
    estimation_methods:
      - direct-computation
      - expert-estimate
    applicability:
      requires:
        - sufficient-metric-coverage-across-systems
    evidence_requirements:
      minimum_source_count: 1
      review_required: true
