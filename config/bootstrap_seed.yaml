  # ============================================================
  # SECTION B — Boundary / control cases (catalog §25)
  # ============================================================
  # These are deliberate anti-examples: simple, complicated, random,
  # or static. Their role is to keep the metric space honest by
  # ruling out "lots of parts" or "high entropy" as proxies for
  # complexity. Marked with system_kind: boundary_case and priority C.
  - slug: simple-pendulum
    name: Simple pendulum
    priority: C
    domain: physical
    classes: [simple-pendulum]
    system_kind: boundary_case
    substrate: rigid body in uniform gravity
    origin: designed
    boundary_clarity: crisp
    primary_function: low-dimensional deterministic oscillator; baseline for the metric space
    lifecycle_stage: maturity
    summary: |
      Two-body deterministic oscillator (point mass on rigid massless rod
      in uniform gravity). Boundary case for the catalog — exemplar of
      "many parts not required for organized dynamics" and "deterministic
      ≠ complex". Closed-form solvable in the small-angle limit.
    boundary:
      type: spatial
      description: A pivot point and a point mass connected by a rigid rod, in a uniform gravitational field; closed mechanical system.
    components:
      - point mass
      - rigid rod
      - pivot
      - gravitational field (external)
    interaction_types:
      - gravitational force on the mass
      - constraint force in the rod
      - small frictional damping at the pivot (sometimes neglected)
    scales:
      spatial:
        - rod length L ~10^-1 to 10^0 m
      temporal:
        - oscillation period T = 2 pi sqrt(L/g) ~10^0 s
    main_feedbacks: []
    dominant_constraints:
      - rigid-rod inextensibility
      - energy conservation (or slow dissipation)
    emergent_properties:
      - simple harmonic motion (small angle)
      - period independence from amplitude (small angle)
    failure_modes:
      - rod breakage (outside system definition)
    canonical_examples:
      - {name: "Foucault pendulum", note: "Demonstrates Earth's rotation; canonical macroscopic instance."}
      - {name: "Grandfather clock pendulum", note: "Canonical timekeeping pendulum."}
      - {name: "Galileo's pendulum experiments", note: "Foundational physics demonstrations."}

  - slug: ideal-gas
    name: Ideal gas
    priority: C
    domain: physical
    classes: [ideal-gas]
    system_kind: boundary_case
    substrate: large number of non-interacting point particles
    origin: designed
    boundary_clarity: crisp
    primary_function: high-N high-entropy weakly-interacting baseline
    lifecycle_stage: maturity
    summary: |
      Large number (~Avogadro) of point particles with no interaction
      energy, in thermodynamic equilibrium. Boundary case for "many
      parts, weak interactions, high entropy" — entropy is large but
      the system has no organization beyond equilibrium.
    boundary:
      type: spatial
      description: A bounded volume containing the gas; closed thermodynamic system (or open with controlled exchange).
    components:
      - point particles (~10^23)
    interaction_types:
      - elastic collisions (in the limit of vanishing collision time)
      - container-wall reflections
    scales:
      spatial:
        - mean free path ~10^-7 m at STP
        - container ~10^-2 to 10^0 m
      temporal:
        - collision frequency ~10^9 s^-1
        - relaxation to equilibrium ~10^-3 s
    main_feedbacks: []
    dominant_constraints:
      - mass / energy conservation
      - PV = NkT
    emergent_properties:
      - bulk thermodynamic properties (P, V, T) from microscopic statistics
      - equipartition theorem
    failure_modes:
      - condensation (failure of ideal-gas assumption)
      - degenerate-gas regime (quantum statistics matter)
    canonical_examples:
      - {name: "Air at STP", note: "Canonical near-ideal gas."}
      - {name: "Helium near room temperature", note: "Closest to ideal because of weak interactions."}
      - {name: "Maxwell-Boltzmann statistical-mechanics textbook system", note: "Foundational pedagogical example."}

