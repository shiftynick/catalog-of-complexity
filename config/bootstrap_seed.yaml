# Bootstrap seed for the Catalog of Complexity
#
# Source manifest for `scripts/bootstrap_from_seed.py`. Each `systems`
# entry produces one `registry/systems/sys-NNNNNN--<slug>/system.yaml`
# (status: bootstrap-stub by default; see schemas/system.schema.json
# for the full v0.2 record shape). Each `metrics` entry produces one
# `registry/metrics/mtr-NNNNNN--<slug>/metric.yaml` (status:
# bootstrap-stub).
#
# Authored by hand from docs/framework/02-candidate-systems-catalog.md.
# Slugs match `taxonomy/source/system-classes.yaml` where a class slug
# already exists; entries that name a new class slug should pair with
# a taxonomy edit in the same commit.
#
# Status convention:
#   - bootstrap-stub: imported in bulk; metric matrix is the next pass.
#                     plan-backlog Tier 3 (profile debt) will pick these
#                     up for upgrade once `phase: metrics-fill`.
#   - candidate:      hand-authored entry awaiting review.
#   - profiled:       review-validated.
#
# Detail tier per entry (informal):
#   * P0 entries (Morowitz emergence anchors + do-not-miss anchors)
#     get substantive `boundary` / `components` / `interaction_types`
#     / `scales` / `main_feedbacks` / `dominant_constraints` /
#     `failure_modes` / `canonical_examples`.
#   * P1 entries get moderate detail (>=3 components, >=3 interactions,
#     spatial+temporal scales, >=2 canonical examples).
#   * P2/P3/C entries get thin stubs (1-2 entries per required list)
#     pending domain-specific upgrade.

phase_label: bootstrap-v1
description: |
  Initial catalog seed sourced from docs/framework/02-candidate-systems-catalog.md
  and docs/framework/03-metric-ontology.md. Every entry corresponds to a
  type-level archetype (per AGENTS.md "What counts as a system worth cataloging").
  Specific instances (e.g. C. elegans, NYSE, Apache Kafka) appear as
  canonical_examples inside type entries, not as their own entries.

systems:
  # ============================================================
  # SECTION A — Physical / cosmological substrate
  # ============================================================
  - slug: cosmic-large-scale-structure
    name: Cosmic large-scale structure
    priority: P0
    domain: physical
    classes: [cosmic-structure]
    system_kind: class
    substrate: dark matter, baryonic matter, radiation
    origin: natural
    boundary_clarity: fuzzy
    primary_function: gravitational hierarchical clustering of matter
    lifecycle_stage: maturity
    summary: |
      Density-driven hierarchical organization of matter across megaparsec
      scales — the cosmic web of filaments, walls, voids, and clusters
      arising from primordial density fluctuations amplified by gravity in
      an expanding spacetime. The largest known organized structure.
    boundary:
      type: spatial
      description: |
        The observable universe; outer boundary is the cosmological horizon
        (~46.5 Gly comoving). Internal organization extends from
        superclusters and filaments down to individual galaxy clusters
        (~tens of Mpc).
    components:
      - dark matter halos (~10^15 solar masses for clusters; the dominant gravitational mass)
      - galaxy clusters and superclusters
      - galaxy filaments and walls
      - cosmic voids (tens to hundreds of Mpc across)
      - hot intracluster medium (X-ray emitting plasma, 10^7-10^8 K)
      - cosmic microwave background photons (~2.7 K relic radiation)
    interaction_types:
      - gravitational attraction (Newtonian on subhorizon scales; general-relativistic globally)
      - cosmic expansion (recession governed by the scale factor a(t))
      - radiative cooling and gas accretion onto halos
      - merger events between halos and clusters
    scales:
      spatial:
        - galaxy ~10^20 m (10 kpc)
        - cluster ~10^23 m (Mpc)
        - filament ~10^24 m (tens of Mpc)
        - observable universe ~10^26 m (Gpc)
      temporal:
        - dynamical time of cluster ~10^16 s (Gyr)
        - age of universe ~4.4 x 10^17 s (13.8 Gyr)
    main_feedbacks:
      - gravitational instability (denser regions accrete more mass)
      - radiative cooling enabling gas collapse to form stars and galaxies
    dominant_constraints:
      - cosmic expansion limits gravitational binding above the cluster scale
      - dark-matter density and equation of state set the clustering pattern
    emergent_properties:
      - filament-void cosmic web topology
      - hierarchical clustering at all observed scales
    failure_modes:
      - none on observable timescales (heat death is asymptotic)
    canonical_examples:
      - {name: "Laniakea Supercluster", note: "Local supercluster containing the Milky Way; ~160 Mpc across."}
      - {name: "Coma Cluster", note: "~1000 galaxies bound in a ~5 Mpc region; canonical X-ray cluster."}
      - {name: "Bootes Void", note: "~330 Mly diameter underdensity; canonical void example."}

  - slug: stellar-system
    name: Stellar / planetary system
    priority: P0
    domain: physical
    classes: [stellar-system]
    system_kind: class
    substrate: hydrogen, helium, heavier elements; gravitational binding
    origin: natural
    boundary_clarity: crisp
    primary_function: gravitational binding plus stellar nuclear fusion energy throughput
    lifecycle_stage: maturity
    summary: |
      Gravitationally bound assembly of one or more stars and orbiting
      bodies (planets, moons, asteroids, comets, dust). Powered by stellar
      fusion, structured by Keplerian orbital mechanics and resonances,
      and bounded by the heliopause / equivalent at the interstellar
      medium interface.
    boundary:
      type: spatial
      description: |
        Gravitational sphere of influence of the central star(s);
        commonly approximated by the heliopause (~120 AU for the Sun)
        for solar-style systems, or the Hill sphere boundary for
        circumbinary cases.
    components:
      - one or more stars (main-sequence, giant, dwarf, or compact remnants)
      - planets (rocky, gaseous, ice giants, dwarf planets)
      - moons and ring systems
      - asteroid and Kuiper-belt-equivalent populations
      - cometary reservoirs (Oort cloud / scattered disk equivalent)
      - heliosphere / astrosphere of stellar wind plasma
    interaction_types:
      - gravitational orbital coupling (Keplerian, with mean-motion resonances)
      - stellar radiation pressure and wind
      - tidal forces (between star-planet, planet-moon)
      - magnetospheric coupling (stellar wind to planetary magnetic fields)
    scales:
      spatial:
        - stellar radius ~10^9 m
        - inner-planet orbit ~10^11 m (1 AU)
        - heliopause ~10^13 m (~100 AU)
        - Oort cloud ~10^16 m (100 kAU)
      temporal:
        - planetary year ~10^7 s
        - stellar main-sequence lifetime ~10^15-10^17 s (Gyr scale)
    main_feedbacks:
      - radiation pressure balancing gravitational accretion in protostellar phase
      - tidal locking and orbital resonance pumping
      - stellar evolution feedback to planetary atmospheres
    dominant_constraints:
      - stellar mass-luminosity-lifetime relation
      - orbital stability (chaotic, but bounded over Gyr)
      - chemical inheritance from the parent molecular cloud
    emergent_properties:
      - habitable zones around main-sequence stars
      - planetary diversity from a small set of formation mechanisms
    failure_modes:
      - stellar evolution off main sequence (red-giant phase, supernova) destabilizes planetary orbits
      - planet-planet scattering ejects worlds into interstellar space
    canonical_examples:
      - {name: "Solar System", note: "Sun + 8 planets + dwarf planets + minor bodies; the empirical anchor for planetary science."}
      - {name: "TRAPPIST-1 system", note: "M-dwarf with seven roughly Earth-size planets in mean-motion resonance; canonical exoplanetary case."}
      - {name: "Alpha Centauri", note: "Triple star system with rocky planet candidate; canonical multi-star case."}

  - slug: turbulent-fluid
    name: Turbulent fluid
    priority: P0
    domain: physical
    classes: [turbulent-fluid]
    system_kind: class
    substrate: gas or liquid in fluid mechanical regime
    origin: natural
    boundary_clarity: fuzzy
    primary_function: dissipative cascade of kinetic energy across scales
    lifecycle_stage: maturity
    summary: |
      Fluid flow at high Reynolds number where inertial forces dominate
      viscous forces and energy injected at large scales cascades through
      a self-similar inertial range to be dissipated at the Kolmogorov
      microscale. Canonical example of dynamical complexity.
    boundary:
      type: spatial
      description: The flow domain (pipe, atmosphere, ocean basin, stellar interior); boundary is the container or free surface.
    components:
      - eddies of all scales between integral and Kolmogorov
      - mean flow component
      - velocity, pressure, temperature, density fields
    interaction_types:
      - nonlinear advection (the v dot grad v term)
      - viscous dissipation
      - vortex stretching and reconnection
      - pressure-velocity coupling enforcing incompressibility
    scales:
      spatial:
        - Kolmogorov microscale eta ~Re^{-3/4} times integral scale
        - integral scale L (system size; pipe diameter, atmospheric boundary layer height)
      temporal:
        - large-eddy turnover time L/U
        - dissipative scale time eta^2/nu
    main_feedbacks:
      - vortex stretching amplifies velocity gradients
      - viscous dissipation removes kinetic energy at small scales
    dominant_constraints:
      - mass conservation (continuity)
      - momentum conservation (Navier-Stokes)
      - energy conservation including dissipation
    emergent_properties:
      - Kolmogorov -5/3 inertial-range energy spectrum
      - intermittency (non-Gaussian velocity-derivative statistics)
      - coherent structures (vortices, hairpins)
    failure_modes:
      - laminarization at low Reynolds number
      - shock formation and compressibility breakdown of incompressible-flow assumptions
    canonical_examples:
      - {name: "Atmospheric boundary layer", note: "Strongest natural high-Re turbulence accessible to direct measurement."}
      - {name: "Pipe flow at Re > ~4000", note: "Classical laboratory turbulence."}
      - {name: "Solar convection zone", note: "Large-Reynolds-number magnetohydrodynamic turbulence driving the solar dynamo."}

  - slug: phase-transition-system
    name: Phase-transition system
    priority: P0
    domain: physical
    classes: [phase-transition-system]
    system_kind: class
    substrate: many-body matter near a critical point
    origin: natural
    boundary_clarity: crisp
    primary_function: qualitative regime change at a control parameter threshold
    lifecycle_stage: maturity
    summary: |
      Many-body system whose macroscopic state changes qualitatively
      at a critical value of a control parameter (temperature,
      pressure, coupling strength). Continuous (second-order)
      transitions exhibit universal scaling exponents independent of
      microscopic detail.
    boundary:
      type: spatial
      description: A bulk material or field-theoretic system with well-defined order parameter and control parameter.
    components:
      - microscopic degrees of freedom (spins, particles, fields)
      - order parameter (magnetization, density, condensate amplitude)
      - control parameter (temperature, pressure, coupling)
    interaction_types:
      - short-range or power-law interactions among components
      - thermal fluctuations
      - external field coupling
    scales:
      spatial:
        - lattice spacing or correlation length microscale
        - correlation length xi (diverges at criticality)
        - system size
      temporal:
        - microscopic relaxation time
        - critical relaxation tau ~xi^z (diverges; critical slowing down)
    main_feedbacks:
      - cooperative alignment near critical point (order parameter responds to itself)
      - long-range correlations from local interactions at criticality
    dominant_constraints:
      - symmetry of the order parameter
      - dimensionality of the order parameter and the system
    emergent_properties:
      - universal scaling exponents (alpha, beta, gamma, delta, nu, eta)
      - power-law correlations at criticality
      - hysteresis in first-order transitions
    failure_modes:
      - symmetry-breaking metastability
      - false vacuum trapping
    canonical_examples:
      - {name: "Liquid-gas critical point", note: "Universality class shared with Ising (3D)."}
      - {name: "Ferromagnet at Curie point", note: "Canonical second-order transition."}
      - {name: "Superfluid lambda transition in He-4", note: "U(1) symmetry breaking."}

  - slug: chemical-element-system
    name: Chemical element system / periodic table
    priority: P0
    domain: physical
    classes: [atomic-system]
    system_kind: class
    substrate: nucleons and electrons bound by electromagnetism
    origin: natural
    boundary_clarity: crisp
    primary_function: quantum-mechanical structuring of bound nucleus-electron systems into reproducible chemical species
    lifecycle_stage: maturity
    summary: |
      The set of all atomic species (~118 elements; thousands of
      isotopes) characterized by atomic number Z and bound electronic
      structure. Quantum mechanics + Pauli exclusion organize electrons
      into shells, generating the periodic table's observed regularities.
    boundary:
      type: functional
      description: A single bound system of one nucleus (any A, Z) plus Z electrons; the smallest unit exhibiting chemical identity.
    components:
      - protons and neutrons in the nucleus (binding energy ~MeV per nucleon)
      - bound electrons in shells (binding energy ~eV)
      - electromagnetic field
    interaction_types:
      - Coulombic electron-nucleus attraction
      - electron-electron Coulomb and exchange interaction
      - spin-orbit coupling
      - nuclear strong force (within the nucleus)
    scales:
      spatial:
        - nuclear radius ~10^-15 m
        - Bohr radius ~5 x 10^-11 m
      temporal:
        - electron orbital period ~10^-16 s
        - nuclear vibration ~10^-21 s
        - radiative lifetime of excited states ~10^-9 to 10^-3 s
    main_feedbacks:
      - shell filling determines chemical reactivity
    dominant_constraints:
      - Pauli exclusion principle
      - Schroedinger / Dirac equation for the bound system
      - nuclear stability valley (drives isotope distribution)
    emergent_properties:
      - periodic table regularities (group, period, block structure)
      - characteristic spectral lines
      - chemical valence
    failure_modes:
      - radioactive decay for unstable isotopes
      - photoionization above the binding energy
    canonical_examples:
      - {name: "Hydrogen atom", note: "Two-body exactly-solvable case."}
      - {name: "Carbon-12", note: "Tetravalent backbone of organic chemistry."}
      - {name: "Iron-56", note: "Maximum-binding-energy nucleus; fusion endpoint."}
    source_refs:
      - src-000008--nist-atomic-spectra-database-nist-standard-reference-databas
      - src-000018--physics-of-atoms-and-molecules
      - src-000019--introduction-to-quantum-mechanics

  - slug: prebiotic-metabolism
    name: Prebiotic / autocatalytic metabolism
    priority: P0
    domain: physical
    classes: [chemical-reaction-network, autocatalytic-set]
    system_kind: transition
    substrate: small organic molecules in aqueous environment
    origin: natural
    boundary_clarity: fuzzy
    primary_function: closed self-reproducing chemical reaction network harvesting environmental free energy
    lifecycle_stage: formation
    summary: |
      A reaction network in which every molecular species is produced by
      at least one reaction catalyzed by a member of the set, capable in
      principle of self-maintenance and self-reproduction in a
      sufficiently rich substrate. The hypothesized chemistry of the
      origin of life.
    boundary:
      type: functional
      description: The closure of the catalytic dependency graph among species; spatial boundary is whatever microenvironment (vesicle, hydrothermal pore, mineral surface) maintains concentration.
    components:
      - small organic monomers (amino acids, nucleotides, sugars, fatty acids)
      - oligomeric catalysts (RNA, peptides)
      - mineral or membrane-confined substrate
      - free-energy input (chemical disequilibrium, geothermal, photochemical)
    interaction_types:
      - chemical reactions (synthesis, hydrolysis, polymerization, redox)
      - catalysis (one species accelerates another's formation)
      - autocatalysis (a species accelerates its own formation directly or indirectly)
      - environmental energy capture
    scales:
      spatial:
        - molecular ~10^-9 m
        - vesicle / pore microenvironment ~10^-6 m
      temporal:
        - reaction timescale ~10^-3 to 10^3 s
        - pool turnover ~hours to days
    main_feedbacks:
      - autocatalytic amplification of catalytically-effective species
      - depletion-and-replenishment cycles tied to environmental fluctuation
    dominant_constraints:
      - thermodynamic free-energy availability (must be net entropy-producing)
      - catalytic specificity (low specificity prevents network closure)
      - confinement preventing dilution
    emergent_properties:
      - chemical closure (every species has a producer in-set)
      - heritable variation under selection on autocatalytic motifs
    failure_modes:
      - hydrolytic dilution and loss of closure
      - catalytic poisoning by accumulating side products
      - thermodynamic equilibration when free energy exhausted
    canonical_examples:
      - {name: "Hypothesized RNA-world ribozyme set", note: "Self-replicating ribozymes as prebiotic autocatalytic candidates."}
      - {name: "Hydrothermal-vent FeS-mediated chemistry", note: "Wachtershauser/Russell scenario."}
      - {name: "Formose reaction sugar autocatalysis", note: "In vitro autocatalytic carbohydrate synthesis."}

  - slug: cell
    name: Cell
    priority: P0
    domain: biological
    classes: [unicellular-organism]
    system_kind: class
    substrate: lipids, proteins, nucleic acids, water, ions
    origin: evolved
    boundary_clarity: crisp
    primary_function: bounded self-maintaining replicative unit harvesting environmental free energy to sustain its own organization
    lifecycle_stage: maturity
    summary: |
      The smallest autonomous biological system: a bounded, internally
      compartmentalized, self-replicating chemical reactor that
      maintains itself far from equilibrium by metabolic free-energy
      throughput. Universal substrate of all known life.
    boundary:
      type: spatial
      description: |
        Phospholipid bilayer plasma membrane (with embedded transport
        proteins) separating cytoplasm from external environment.
        Eukaryotic cells contain additional internal membranes
        (organelles).
    components:
      - genome (DNA, organized as one or more chromosomes; ~10^6 to ~10^11 bp)
      - ribosomes (~10^4-10^7 per cell)
      - cytoskeleton (actin, intermediate filaments, microtubules)
      - organelles (mitochondria, ER, Golgi, nucleus in eukaryotes)
      - cytoplasmic enzyme pool
      - membrane transporters and receptors
    interaction_types:
      - DNA replication, transcription, translation
      - signal transduction (receptor-mediated cascades)
      - metabolic flux through enzymatic pathways
      - membrane transport (active and passive)
      - cytoskeletal force generation
    scales:
      spatial:
        - prokaryote ~10^-6 m
        - eukaryote ~10^-5 m
      temporal:
        - protein turnover ~10^2 to 10^4 s
        - cell cycle ~10^3 to 10^5 s
        - protein-conformation dynamics ~10^-9 to 10^-3 s
    main_feedbacks:
      - homeostatic regulation of pH, osmolarity, ion gradients
      - transcriptional feedback maintaining stable expression states
      - metabolic feedback (allosteric regulation, feedback inhibition)
    dominant_constraints:
      - membrane impermeability + selective transporter availability
      - free-energy supply (ATP, ion gradients)
      - genome integrity and replication fidelity
    emergent_properties:
      - self-replication
      - compartmentalized metabolism
      - heritable individual identity
    failure_modes:
      - apoptosis / programmed cell death
      - membrane rupture and lysis
      - replication errors leading to non-viable progeny
    canonical_examples:
      - {name: "Escherichia coli", note: "Canonical model prokaryote; ~5 Mbp genome, ~30 min division time."}
      - {name: "Saccharomyces cerevisiae", note: "Canonical model eukaryote; budding yeast."}
      - {name: "Human red blood cell", note: "Anucleate specialized cell; canonical metabolic-network case."}
    source_refs:
      - src-000012--molecular-biology-of-the-cell

  - slug: eukaryotic-cell
    name: Eukaryotic cell
    priority: P0
    domain: biological
    classes: [unicellular-organism]
    system_kind: transition
    substrate: lipid membranes, internal organelles, multipartite chromatin
    origin: evolved
    boundary_clarity: crisp
    primary_function: compartmentalized cellular organization with endosymbiotic energy organelles
    lifecycle_stage: maturity
    summary: |
      A cell with a true nucleus and membrane-bound organelles
      (mitochondria, ER, Golgi, often plastids), the product of
      symbiogenesis between an archaeal host and an alpha-proteobacterial
      endosymbiont. The substrate of all multicellular life and the
      structural basis for the second great transition in biological
      complexity.
    boundary:
      type: spatial
      description: |
        Plasma membrane plus the nuclear envelope and organelle membranes
        creating internal subcompartments. Distinct from prokaryotes by
        the presence of a nucleus, organelles, and a complex
        cytoskeleton.
    components:
      - nucleus with linear chromatin and nuclear envelope
      - mitochondria (descendants of alpha-proteobacterial endosymbiont)
      - endoplasmic reticulum (rough and smooth)
      - Golgi apparatus
      - lysosomes / vacuoles
      - cytoskeleton (actin, microtubules, intermediate filaments)
      - in plant lineages, plastids (descendants of cyanobacterial endosymbiont)
    interaction_types:
      - nucleo-cytoplasmic transport via nuclear pore complexes
      - vesicular trafficking among organelles (COPI, COPII, clathrin pathways)
      - mitochondrial-nuclear retrograde signaling
      - endomembrane biogenesis and turnover
    scales:
      spatial:
        - cell ~10^-5 m
        - organelle ~10^-7 to 10^-6 m
      temporal:
        - cell cycle ~10^4 to 10^5 s (8-24 h typical)
        - organelle turnover ~10^4 to 10^6 s
    main_feedbacks:
      - mitochondrial-nuclear cross-talk balancing biogenesis with energy demand
      - vesicular flux balance among compartments
      - chromatin conformation feedback on transcription
    dominant_constraints:
      - membrane lipid composition and curvature constraints on organelle identity
      - genome size limited by replication fidelity and division economics
    emergent_properties:
      - intracellular spatial differentiation
      - true multicellularity becoming evolvable
      - eukaryotic-specific information processing (splicing, alternative isoforms)
    failure_modes:
      - mitochondrial dysfunction triggering apoptosis
      - nuclear envelope breakdown errors
      - organelle imbalance (ER stress, lysosomal storage)
    canonical_examples:
      - {name: "Saccharomyces cerevisiae", note: "Canonical unicellular eukaryote model."}
      - {name: "Tetrahymena thermophila", note: "Canonical ciliate; macronucleus/micronucleus split."}
      - {name: "Naegleria gruberi", note: "Free-living amoeboflagellate; canonical excavate eukaryote."}
    source_refs:
      - src-000012--molecular-biology-of-the-cell
      - src-000016--origin-of-the-cell-nucleus-mitosis-and-sex-roles-of-intracel

  - slug: multicellular-organism
    name: Multicellular organism
    priority: P0
    domain: biological
    classes: [multicellular-organism]
    system_kind: transition
    substrate: differentiated eukaryotic cells with shared genome
    origin: evolved
    boundary_clarity: crisp
    primary_function: coordinated body of clonally related differentiated cells maintaining a shared somatic-germline life cycle
    lifecycle_stage: maturity
    summary: |
      A coordinated colony of differentiated cells with a shared genome,
      separated into specialized tissues, organs, and (in animals)
      organ systems. Independently evolved at least 25 times in
      eukaryotic lineages. The substrate of all macroscopic life.
    boundary:
      type: spatial
      description: |
        The outer integument or equivalent (skin, cuticle, cell wall in
        plants) demarcating soma from environment, and the germline /
        soma distinction internally.
    components:
      - somatic cells of multiple differentiated types (hundreds in vertebrates)
      - germ cells (gametes and their precursors)
      - extracellular matrix
      - tissue-organizing signaling gradients
      - in animals, organs and organ systems
    interaction_types:
      - cell-cell signaling (juxtacrine, paracrine, endocrine, synaptic)
      - mechanical coupling via ECM
      - developmental cell fate specification and migration
      - immune surveillance of self vs altered-self
    scales:
      spatial:
        - cell ~10^-5 m
        - tissue ~10^-3 m
        - organ ~10^-2 m
        - organism ~10^-3 to 10^2 m (microscopic to whale)
      temporal:
        - cell cycle ~10^4 s
        - developmental timescale ~10^5 to 10^9 s
        - organism lifespan ~10^7 to 10^9 s
    main_feedbacks:
      - homeostatic feedback within and across tissues (endocrine, neural)
      - developmental cell-fate feedback (lateral inhibition, gradient induction)
      - growth-control feedback preventing tumorigenesis
    dominant_constraints:
      - shared genome implies shared evolutionary fate
      - germline-soma distinction limits heritability of somatic change
      - oxygen / nutrient diffusion limits maximum cell-from-vessel distance
    emergent_properties:
      - body plans (bilateria, radiata, etc.)
      - centralized regulatory systems (nervous, immune, endocrine)
      - complex behavior
    failure_modes:
      - cancer (somatic-evolution defection)
      - developmental malformation
      - autoimmunity
      - aging-related multi-organ failure
    canonical_examples:
      - {name: "Caenorhabditis elegans", note: "Nematode; canonical model with ~959 invariant somatic cells."}
      - {name: "Drosophila melanogaster", note: "Fruit fly; canonical developmental and behavioral model."}
      - {name: "Mus musculus", note: "Mouse; canonical mammalian model."}
      - {name: "Arabidopsis thaliana", note: "Canonical model plant; small, fast-cycling, well-genetically-mapped."}
      - {name: "Homo sapiens", note: "Self-referential canonical example; ~3.7 x 10^13 cells across ~200 cell types."}

  - slug: gene-regulatory-network
    name: Gene regulatory network
    priority: P0
    domain: biological
    classes: [gene-regulatory-network]
    system_kind: class
    substrate: DNA + RNA + transcription factors + chromatin
    origin: evolved
    boundary_clarity: crisp
    primary_function: program developmental cell-fate decisions and homeostatic transcriptional responses
    lifecycle_stage: maturity
    summary: |
      Within-cell graph of regulatory interactions among genes mediated by
      transcription factors, microRNAs, long non-coding RNAs, and
      chromatin modifiers. Realizes developmental cell-fate decisions,
      homeostatic responses, and oscillatory behavior; substrate of
      developmental biology and systems biology.
    boundary:
      type: functional
      description: All regulatory interactions among gene products within a single cell type or developmental context; boundary is the cell, but the network is defined at the regulatory-graph level.
    components:
      - protein-coding genes (~10^4 in mammals)
      - regulatory RNAs (microRNAs, lncRNAs)
      - transcription factors (~10^3 in mammals)
      - cis-regulatory elements (promoters, enhancers, silencers)
      - chromatin modifiers and remodelers
    interaction_types:
      - sequence-specific TF binding to cis-regulatory elements
      - cooperative TF assembly on enhancers
      - chromatin state modulation (methylation, acetylation, accessibility)
      - post-transcriptional regulation by ncRNAs
    scales:
      spatial:
        - regulatory element ~10^-7 m (~kb)
        - genome ~10^-2 m unraveled, ~10^-5 m packed
      temporal:
        - transcription pulse ~10^2 s
        - protein lifetime ~10^3 to 10^5 s
        - developmental switch ~10^3 to 10^5 s
    main_feedbacks:
      - autoregulatory negative feedback (transcription factor represses own gene)
      - mutual repression bistable switches (lateral inhibition)
      - feed-forward loops (filtering and pulse generation)
    dominant_constraints:
      - cooperative binding kinetics
      - chromatin accessibility
      - gene-product half-lives setting response timescales
    emergent_properties:
      - bistability and multistability (cell-fate determination)
      - oscillation (segmentation clock, circadian rhythms)
      - robustness to noise (canalization)
    failure_modes:
      - dysregulated bistability (oncogenic state lock-in)
      - feedback-loop failure leading to runaway expression
      - misexpression in wrong cell context (developmental defects, cancer)
    canonical_examples:
      - {name: "Sea urchin endomesoderm GRN", note: "Davidson et al., textbook reference for developmental GRN architecture."}
      - {name: "Drosophila segmentation network", note: "Gap, pair-rule, segment-polarity GRN; canonical morphogen-cascade case."}
      - {name: "Mammalian circadian clock GRN", note: "BMAL1/CLOCK/PER/CRY transcription-translation feedback loop."}
    source_refs:
      - src-000013--the-regulatory-genome-gene-regulatory-networks-in-developmen
      - src-000014--an-introduction-to-systems-biology-design-principles-of-biol
      - src-000015--metabolic-stability-and-epigenesis-in-randomly-constructed-g

  - slug: metabolic-network
    name: Metabolic network
    priority: P0
    domain: biological
    classes: [metabolic-network]
    system_kind: class
    substrate: enzymatic biochemistry within a cell or organelle
    origin: evolved
    boundary_clarity: crisp
    primary_function: biochemical conversion of input substrates into energy and biosynthetic precursors
    lifecycle_stage: maturity
    summary: |
      Intracellular graph of biochemical reactions — metabolites as
      nodes, enzyme-catalyzed conversions as edges — collectively
      realizing a cell's energy generation, biosynthetic precursor
      supply, and waste disposal. The chemical engine of life.
    boundary:
      type: functional
      description: All enzyme-catalyzed reactions whose substrates and products are intracellular metabolites; spatial bound is the cell or organelle.
    components:
      - small-molecule metabolites (~10^3 distinct species in E. coli; ~10^4 in human)
      - enzymes (~10^3)
      - cofactors (NAD/NADH, NADP/NADPH, ATP, FAD, coenzyme A, vitamins)
      - transport proteins
    interaction_types:
      - enzyme-catalyzed reactions (biochemical conversions)
      - allosteric regulation
      - metabolite channeling between sequential enzymes
      - compartment-crossing transport
    scales:
      spatial:
        - molecular ~10^-9 m
        - cell or organelle ~10^-6 to 10^-5 m
      temporal:
        - enzymatic turnover ~10^-3 to 10^0 s
        - metabolite pool turnover ~10^0 to 10^3 s
        - metabolic adaptation ~10^2 to 10^4 s
    main_feedbacks:
      - feedback inhibition (end-product inhibits committing-step enzyme)
      - allosteric activation by precursors
      - transcriptional feedback adjusting enzyme abundance
    dominant_constraints:
      - thermodynamic feasibility (Gibbs free energy)
      - mass and atom conservation (stoichiometry)
      - cofactor pool size and balance
    emergent_properties:
      - flux distribution patterns (rich-club / bow-tie metabolic topology)
      - homeostatic robustness to perturbation
    failure_modes:
      - cofactor imbalance (e.g. NADH overload)
      - toxic intermediate accumulation when downstream pathway blocked
      - thermodynamic infeasibility under low free-energy supply
    canonical_examples:
      - {name: "E. coli central carbon metabolism", note: "Glycolysis + TCA + pentose phosphate; canonical reference model (iJO1366, etc.)."}
      - {name: "Human red blood cell metabolism", note: "Glycolysis without mitochondria; canonical metabolic-network minimal model."}
      - {name: "Methanogen archaeal metabolism", note: "CO2 + H2 -> CH4; canonical anaerobic metabolism."}
    source_refs:
      - src-000004--a-comprehensive-genome-scale-reconstruction-of-i-escherichia
      - src-000005--the-large-scale-organization-of-metabolic-networks
      - src-000006--highly-accurate-genome-sequences-of-i-escherichia-coli-i-k-1
      - src-000007--the-complete-genome-sequence-of-i-escherichia-coli-i-k-12

  - slug: microbiome
    name: Microbiome
    priority: P0
    domain: biological
    classes: [microbiome]
    system_kind: class
    substrate: multi-taxon microbial community in a host or environmental niche
    origin: evolved
    boundary_clarity: fuzzy
    primary_function: community-level metabolic and ecological coupling within a host or environmental matrix
    lifecycle_stage: maturity
    summary: |
      Type-level archetype for a multi-taxon microbial community
      resident in a defined niche — host tissue (gut, skin, oral
      cavity, root rhizosphere) or environmental matrix (marine surface
      water, sediment, deep subsurface, built-environment surface).
      Members are coupled by trophic cross-feeding, syntrophy,
      competition, phage predation, host or niche signaling, and
      horizontal gene transfer.
    boundary:
      type: spatial
      description: |
        The microbiome occupies a delimited niche (a host tissue
        compartment or an environmental matrix) and includes the
        bacterial, archaeal, fungal, and viral populations resident in
        that niche together with the microbe-derived metabolite pools.
    components:
      - bacterial populations (typically 10^9-10^14 cells per host or per gram)
      - archaeal populations (methanogens, ammonia oxidizers, halophiles)
      - fungal populations
      - viral populations (bacteriophages and eukaryotic viruses)
      - microbial metabolite pools
      - extracellular polymeric matrix and biofilm structural components
      - mobile genetic elements (plasmids, integrative conjugative elements, prophages)
    interaction_types:
      - trophic cross-feeding
      - syntrophy
      - competition for substrates and niches
      - bacteriophage predation and lysis
      - host immune and metabolic signaling (in host-associated cases)
      - horizontal gene transfer
      - quorum sensing
    scales:
      spatial:
        - cell scale ~10^-6 m
        - biofilm and microcolony scale ~10^-4 m
        - niche or host-organ scale ~10^-1 m
      temporal:
        - metabolite-pool turnover ~10^2 to 10^4 s
        - community restructuring after perturbation ~weeks-months
        - successional dynamics ~years-decades
    main_feedbacks:
      - cross-feeding loops stabilizing community structure
      - host-microbe metabolic feedback
      - phage-bacteria population oscillation
    dominant_constraints:
      - substrate availability from host or environment
      - host immunity (in host-associated cases)
      - thermodynamic constraints on syntrophic chains
    emergent_properties:
      - community-level metabolic functions (e.g. SCFA production in gut)
      - ecological resilience to invasion
      - host-microbiome co-adaptation
    failure_modes:
      - dysbiosis (loss of beneficial taxa, expansion of pathogens)
      - invasion by exogenous pathogens
      - antimicrobial-driven collapse and re-equilibration
    canonical_examples:
      - {name: "Human gut microbiome", note: "Highest-density host-associated microbiome; hundreds of species, 10^11-10^12 cells/g."}
      - {name: "Rhizosphere microbiome", note: "Root-soil interface community shaping plant nutrient uptake."}
      - {name: "Marine surface (epipelagic) microbiome", note: "SAR11/Prochlorococcus/Synechococcus dominated; couples to global biogeochemistry."}
      - {name: "Oral microbiome", note: "Multi-site biofilm community; site-specific assemblies."}
      - {name: "Skin microbiome", note: "Patchwork of dry/moist/sebaceous microhabitats."}
    source_refs:
      - src-000010--animals-in-a-bacterial-world-a-new-imperative-for-the-life-s
      - src-000011--the-application-of-ecological-theory-toward-an-understanding

  - slug: immune-system
    name: Immune system
    priority: P0
    domain: biological
    classes: [immune-system]
    system_kind: class
    substrate: lymphoid and myeloid cells plus signaling molecules
    origin: evolved
    boundary_clarity: fuzzy
    primary_function: discriminate self from non-self and mount adaptive responses to pathogens
    lifecycle_stage: maturity
    summary: |
      Cellular and molecular subsystem of an animal that discriminates
      self from non-self and responds to threats. Vertebrate adaptive
      immunity adds clonal selection on lymphocyte receptors and
      immunological memory. Canonical adaptive complex system; classic
      structural homolog of cybersecurity.
    boundary:
      type: functional
      description: All cells, organs (thymus, lymph nodes, spleen, bone marrow), and signaling molecules dedicated to host defense; spatial bound is the organism but functionally distinct from other physiological systems.
    components:
      - innate immune cells (macrophages, dendritic cells, neutrophils, NK cells)
      - adaptive immune cells (B cells, T cells)
      - antibodies (~10^11 distinct specificities in humans)
      - T-cell receptors (~10^15 to 10^18 potential sequences)
      - cytokines and chemokines
      - lymphoid organs (thymus, lymph nodes, spleen, bone marrow)
    interaction_types:
      - antigen presentation by MHC I/II
      - clonal selection and expansion
      - antibody-antigen binding
      - cytokine signaling cascades
      - immunological memory formation
    scales:
      spatial:
        - cell ~10^-5 m
        - lymph node ~10^-3 m
        - lymphoid network ~10^0 m
      temporal:
        - innate response ~hours
        - primary adaptive response ~days
        - memory persistence ~years to decades
    main_feedbacks:
      - clonal expansion under antigenic stimulation
      - regulatory T-cell suppression preventing autoimmunity
      - cytokine networks balancing Th1/Th2/Th17 responses
    dominant_constraints:
      - thymic selection prevents grossly autoreactive T cells
      - resource allocation between innate and adaptive arms
      - tolerance vs response trade-off
    emergent_properties:
      - immunological memory
      - self/non-self discrimination
      - clonal repertoire
    failure_modes:
      - autoimmunity (false-positive self-attack)
      - immunodeficiency (false-negative pathogen escape)
      - allergic / hypersensitivity reactions
      - chronic inflammation
    canonical_examples:
      - {name: "Human adaptive immunity", note: "Best-studied vertebrate adaptive immune system."}
      - {name: "Drosophila innate immunity", note: "Classic invertebrate model; Toll and Imd pathways."}
      - {name: "CRISPR-Cas in prokaryotes", note: "Microbial adaptive immunity via genomic memory; canonical alternative architecture."}

  - slug: nervous-system
    name: Nervous system
    priority: P0
    domain: biological
    classes: [nervous-system]
    system_kind: class
    substrate: neurons + glia + neurotransmitters
    origin: evolved
    boundary_clarity: crisp
    primary_function: rapid long-range information transfer and behavioral control
    lifecycle_stage: maturity
    summary: |
      Network of neurons (and supporting glia) that conducts and processes
      signals across an animal body, enabling sensation, decision, and
      action on millisecond timescales. Substrate of behavior, learning,
      and (in some lineages) cognition.
    boundary:
      type: functional
      description: All neurons, glial cells, and connective tissue dedicated to electrochemical signaling; bounded by the organism and (in vertebrates) the blood-brain barrier.
    components:
      - neurons (~10^11 in human brain; ~10^2 in C. elegans; ~10^5 in Drosophila)
      - glial cells (astrocytes, oligodendrocytes, microglia)
      - synapses (~10^14-10^15 in human)
      - neurotransmitter and neuropeptide pools
      - sensory transducers
      - neuromuscular junctions
    interaction_types:
      - synaptic transmission (chemical and electrical)
      - action potential propagation
      - long-term potentiation and depression
      - neuromodulation
    scales:
      spatial:
        - synapse ~10^-9 to 10^-6 m
        - circuit ~10^-3 m
        - whole-brain ~10^-1 m
      temporal:
        - action potential ~10^-3 s
        - synaptic plasticity ~seconds to days
        - learning consolidation ~hours to years
    main_feedbacks:
      - Hebbian plasticity (correlated activity strengthens synapses)
      - homeostatic plasticity stabilizing firing rates
      - inhibitory feedback preventing runaway excitation
    dominant_constraints:
      - metabolic cost of action potentials (~20% of human resting metabolism)
      - axon length and conduction delay
      - synaptic density limit
    emergent_properties:
      - learning and memory
      - sensory perception
      - motor coordination
      - in some lineages, cognition and consciousness
    failure_modes:
      - epileptic seizure (synchronous excitation runaway)
      - stroke / ischemic injury
      - neurodegeneration
      - chronic pain
    canonical_examples:
      - {name: "Caenorhabditis elegans nervous system", note: "302 neurons, fully reconstructed connectome; canonical small-nervous-system model."}
      - {name: "Drosophila central complex", note: "Mid-scale invertebrate model with documented behavioral roles."}
      - {name: "Mammalian neocortex", note: "Canonical large-scale layered cortical architecture."}

  - slug: brain
    name: Brain
    priority: P0
    domain: biological
    classes: [brain, central-nervous-system]
    system_kind: class
    substrate: dense neural tissue with vascular and glial support
    origin: evolved
    boundary_clarity: crisp
    primary_function: centralized integration, learning, and high-bandwidth control of sensorimotor and cognitive function
    lifecycle_stage: maturity
    summary: |
      The most centralized portion of an animal nervous system, dense
      with neurons and synapses, organized into functional regions and
      (in vertebrates) layered cortex. Substrate of perception,
      learning, decision-making, and (in some lineages) consciousness.
      The most studied complex system in nature.
    boundary:
      type: spatial
      description: |
        The cranial nervous tissue, demarcated by the meninges and
        blood-brain barrier from peripheral systems. Includes (in
        vertebrates) cerebrum, cerebellum, brainstem, and midbrain
        structures.
    components:
      - cerebral cortex (~10^10 neurons in human)
      - subcortical nuclei (basal ganglia, thalamus, hypothalamus, hippocampus, amygdala)
      - cerebellum (~5 x 10^10 neurons)
      - brainstem
      - white-matter tracts (long-range axonal projections)
      - vascular and glial support tissue
    interaction_types:
      - intra-area recurrent processing
      - inter-area long-range projections
      - thalamocortical loops
      - basal-ganglia-cortical loops
      - neuromodulatory broadcast (dopamine, serotonin, noradrenaline, acetylcholine)
    scales:
      spatial:
        - microcircuit ~10^-3 m
        - cortical area ~10^-2 m
        - whole brain ~10^-1 m
      temporal:
        - spiking ~10^-3 s
        - perception ~10^-1 s
        - working-memory span ~10^0 s
        - episodic memory consolidation ~10^4 s
    main_feedbacks:
      - predictive-coding feedback between cortical hierarchies
      - reward-prediction-error feedback in dopaminergic system
      - sleep-driven memory consolidation
    dominant_constraints:
      - metabolic budget (~20% of resting human energy)
      - skull volume / craniofacial geometry
      - white-matter wiring cost (long projections expensive)
    emergent_properties:
      - perception and attention
      - episodic and semantic memory
      - decision-making
      - in some species, consciousness and self-modeling
    failure_modes:
      - stroke (focal ischemic injury)
      - seizure (network synchronization collapse)
      - neurodegeneration (Alzheimer's, Parkinson's)
      - traumatic injury with long-recovery sequelae
    canonical_examples:
      - {name: "Human brain", note: "~86 x 10^9 neurons; canonical reference."}
      - {name: "Mouse brain", note: "~7 x 10^7 neurons; canonical model for cellular and circuit-level neuroscience."}
      - {name: "Octopus brain", note: "Distributed nervous system with 2/3 of neurons in arms; canonical alternative architecture."}

  - slug: ant-colony
    name: Ant colony
    priority: P0
    domain: biological
    classes: [superorganism]
    system_kind: class
    substrate: hundreds to millions of ant individuals + nest infrastructure
    origin: evolved
    boundary_clarity: fuzzy
    primary_function: collectively forage, defend, and reproduce as a unit of selection
    lifecycle_stage: maturity
    summary: |
      Eusocial insect colony exhibiting reproductive division of labor
      between sterile workers and reproductive queens (and, in some
      species, soldiers). Treated as a unit of selection. Canonical
      example of self-organized stigmergic coordination through pheromone
      trails and local interaction rules. Foundational for the
      superorganism concept.
    boundary:
      type: spatial
      description: The nest and the foraging perimeter where colony pheromone trails define territory; functionally bounded by genetic relatedness within the colony.
    components:
      - workers (sterile females; orders of magnitude more than other castes)
      - reproductive queen (typically one or few)
      - in some species, soldiers (specialized defensive caste)
      - male reproductives (ephemeral; produced for mating flights)
      - brood (eggs, larvae, pupae)
      - nest infrastructure (chambers, tunnels)
      - pheromone communication system
    interaction_types:
      - pheromone trail laying and following (stigmergy)
      - trophallaxis (oral food exchange)
      - tactile and chemical individual recognition
      - colony-level division of labor
      - inter-colony aggression at territory boundaries
    scales:
      spatial:
        - individual ant ~10^-3 m
        - nest ~10^-1 to 10^0 m
        - foraging perimeter ~10^1 to 10^2 m
      temporal:
        - individual ant lifespan ~weeks to months
        - colony lifespan ~years to decades (queen-life)
    main_feedbacks:
      - pheromone-trail amplification of successful foraging routes
      - density-dependent task switching among workers
      - queen-pheromone suppression of worker reproduction
    dominant_constraints:
      - individual ant cognitive capacity (very limited)
      - resource availability in foraging perimeter
      - genetic relatedness threshold for cooperative behavior
    emergent_properties:
      - shortest-path discovery via pheromone optimization
      - division of labor without centralized control
      - colony-level "intelligence" exceeding individual cognition
    failure_modes:
      - queen death (colony decline unless replacement queen)
      - invasion by competitor colonies
      - resource depletion in foraging perimeter
      - parasitic exploitation (myrmecophiles, social parasites)
    canonical_examples:
      - {name: "Atta cephalotes", note: "Leaf-cutter ant; canonical fungal-cultivating colony, millions of workers."}
      - {name: "Solenopsis invicta", note: "Red imported fire ant; canonical invasive supercolony case."}
      - {name: "Linepithema humile", note: "Argentine ant; canonical example of intercontinental supercolony."}

  - slug: ecosystem
    name: Ecosystem
    priority: P0
    domain: ecological
    classes: [ecosystem]
    system_kind: class
    substrate: biotic communities + abiotic environment
    origin: evolved
    boundary_clarity: fuzzy
    primary_function: cycle energy and matter through coupled biotic-abiotic flows
    lifecycle_stage: maturity
    summary: |
      Biotic community plus its abiotic environment, coupled through
      energy flow and biogeochemical cycling. Defined at scales from
      local patches (a pond) to biomes (the Amazon rainforest) to the
      global biosphere. Substrate of ecology.
    boundary:
      type: spatial
      description: A bounded geographic region whose biotic and abiotic components are functionally coupled through energy and matter flows; boundary is typically drawn at major discontinuities in vegetation, climate, or habitat.
    components:
      - primary producers (plants, algae, photosynthetic bacteria)
      - consumers (herbivores, carnivores, omnivores)
      - decomposers (bacteria, fungi)
      - abiotic substrate (soil, water, atmosphere)
      - nutrient pools (nitrogen, phosphorus, carbon)
      - climate forcing
    interaction_types:
      - trophic interactions (predation, herbivory, parasitism)
      - competition for resources
      - mutualism (pollination, mycorrhizal associations)
      - decomposition and nutrient cycling
      - succession after disturbance
    scales:
      spatial:
        - patch ~10^0 to 10^2 m
        - landscape ~10^3 to 10^5 m
        - biome ~10^6 to 10^7 m
      temporal:
        - generation times ~10^7 to 10^9 s
        - successional dynamics ~10^9 to 10^10 s
        - evolutionary timescale ~10^11 to 10^13 s
    main_feedbacks:
      - predator-prey population cycles
      - nutrient cycling regulating productivity
      - climate-vegetation feedback (albedo, evapotranspiration)
      - density-dependent regulation
    dominant_constraints:
      - solar energy input
      - water and nutrient availability
      - thermodynamic limits (~10% trophic transfer efficiency)
    emergent_properties:
      - biodiversity patterns
      - food-web topology
      - succession trajectories
      - ecosystem services (pollination, water purification, climate regulation)
    failure_modes:
      - regime shift / tipping point (e.g. coral bleaching, savannization)
      - cascading extinctions from keystone-species loss
      - biodiversity collapse from habitat destruction
      - invasive-species takeover
    canonical_examples:
      - {name: "Amazon rainforest", note: "Largest tropical ecosystem; canonical high-biodiversity terrestrial case."}
      - {name: "Coral reef", note: "Highest biodiversity per area; canonical mutualism-driven ecosystem."}
      - {name: "Boreal forest", note: "Largest terrestrial biome by area; canonical low-diversity temperature-limited ecosystem."}
      - {name: "Open ocean / pelagic ecosystem", note: "Largest ecosystem by volume; canonical microbial-loop case."}

  - slug: food-web
    name: Food web
    priority: P0
    domain: ecological
    classes: [food-web]
    system_kind: class
    substrate: ecological community as a who-eats-whom graph
    origin: evolved
    boundary_clarity: fuzzy
    primary_function: trophic energy flow through a community
    lifecycle_stage: maturity
    summary: |
      Network representation of trophic (who-eats-whom) relationships
      in an ecological community. The classic graph object in ecology;
      substrate for connectance, motif, and stability analyses.
    boundary:
      type: functional
      description: All trophic links among species in an ecological community; spatial bound is the ecosystem the community occupies.
    components:
      - species (or trophic groups) as nodes
      - directed edges from prey to predator
      - basal species (autotrophs, detritivores)
      - apex predators
    interaction_types:
      - predation
      - herbivory
      - parasitism
      - omnivory (cross-trophic-level feeding)
      - cannibalism (intra-species predation)
    scales:
      spatial:
        - community ~10^2 to 10^5 m
      temporal:
        - generation cycle of constituent species
        - trophic-cascade response ~years to decades
    main_feedbacks:
      - top-down control (predator regulates prey)
      - bottom-up control (resource availability sets predator population)
      - apparent competition (shared predator couples otherwise unrelated prey)
    dominant_constraints:
      - thermodynamic ~10% trophic transfer efficiency
      - body-size-based prey-predator constraints
      - spatial overlap requirements
    emergent_properties:
      - trophic levels (despite continuous diet variation)
      - keystone-species effects
      - food-web stability vs complexity (May's paradox)
    failure_modes:
      - trophic cascade from apex-predator loss
      - keystone-species extinction
      - food-web simplification under stress
    canonical_examples:
      - {name: "Yellowstone wolf-elk-aspen cascade", note: "Canonical empirical trophic cascade."}
      - {name: "Pacific kelp-urchin-otter cascade", note: "Canonical marine trophic cascade."}
      - {name: "Lake Constance pelagic food web", note: "Highly resolved freshwater food web, canonical reference dataset."}

  - slug: language
    name: Language
    priority: P0
    domain: cognitive
    classes: [language-system, language-community]
    system_kind: transition
    substrate: shared symbolic conventions in a community of speakers
    origin: emergent
    boundary_clarity: fuzzy
    primary_function: compositional symbolic communication and cultural transmission
    lifecycle_stage: maturity
    summary: |
      A compositional symbolic communication system with grammar,
      lexicon, and pragmatic conventions, evolving in a community of
      speakers. Substrate of cumulative culture; the foundational
      cultural-evolutionary medium. Spans tens of thousands of years
      of human history.
    boundary:
      type: functional
      description: The shared linguistic code of a speech community; boundary is mutual intelligibility (often dialectal continuum rather than crisp).
    components:
      - phonology (sound inventory)
      - morphology (word formation)
      - lexicon (vocabulary, ~10^4-10^5 morphemes per language)
      - syntax (grammatical rules)
      - pragmatics (use conventions)
      - speakers (community of users)
    interaction_types:
      - speech production and comprehension
      - language acquisition (child learning from caregivers)
      - linguistic innovation and propagation
      - language contact and borrowing
    scales:
      spatial:
        - speaker ~10^0 m
        - community ~10^4 to 10^7 speakers
        - global language ~10^9 speakers (e.g. English, Mandarin)
      temporal:
        - utterance ~10^0 s
        - generational learning ~10^9 s (decades)
        - language change ~10^10 to 10^13 s (centuries to millennia)
    main_feedbacks:
      - frequency-driven entrenchment (common forms become more common)
      - regularization of irregularities through child learning
      - prestige-driven adoption of innovations
    dominant_constraints:
      - cognitive constraints on parsing and production
      - articulatory constraints on phonology
      - communicative pressure for ambiguity reduction
    emergent_properties:
      - compositional infinite expressive capacity from finite means
      - Zipf's law in word frequency
      - regularity-irregularity gradient (frequent forms tolerate irregularity)
    failure_modes:
      - language death (loss of speakers)
      - mutual unintelligibility from drift (dialect to language transition)
      - language attrition under contact pressure
    canonical_examples:
      - {name: "English", note: "Most-studied language; ~1.5 x 10^9 speakers including L2."}
      - {name: "Mandarin Chinese", note: "Largest L1 community; ~10^9 speakers."}
      - {name: "Pirahã", note: "Cited example of unusual grammatical features; useful for typological boundaries."}

  - slug: city
    name: City
    priority: P0
    domain: social
    classes: [city, urban-metabolism]
    system_kind: class
    substrate: humans + built environment + infrastructure + institutions
    origin: hybrid
    boundary_clarity: fuzzy
    primary_function: dense human settlement coupling infrastructure, economy, and governance
    lifecycle_stage: maturity
    summary: |
      A dense human settlement with infrastructure, economy, and
      governance. Canonical urban-complexity object — exhibits
      universal scaling laws (West et al.) in resource consumption,
      socioeconomic output, and infrastructure with population. Coupled
      to hinterland through commodity, food, water, energy, and
      information flows.
    boundary:
      type: mixed
      description: |
        Spatial — the contiguous built-up area or municipal boundary.
        Functional — the labor market and commuting shed (often larger
        than the formal city boundary, leading to metropolitan-area
        definitions).
    components:
      - residents (10^4 to 10^7+)
      - firms and economic actors
      - housing stock
      - transportation network (roads, transit, airports)
      - utility infrastructure (water, sewer, power, telecom)
      - government and institutions
      - public space
    interaction_types:
      - daily mobility (commuting, errands)
      - economic exchange (labor, goods, services)
      - communication (face-to-face, telecom)
      - governance and regulation
      - resource flows (energy, water, food, materials)
    scales:
      spatial:
        - building ~10^1 m
        - neighborhood ~10^3 m
        - city ~10^4 to 10^5 m
        - metropolitan area ~10^5 to 10^6 m
      temporal:
        - daily commuting cycle ~10^5 s
        - housing-stock turnover ~10^9 s (decades)
        - urban-form change ~10^10 s (centuries)
    main_feedbacks:
      - agglomeration economies (productivity rises with size)
      - congestion costs (efficiency falls with size)
      - housing-price-driven displacement
      - migration responding to opportunity
      - infrastructure-investment feedback
    dominant_constraints:
      - water and energy supply
      - transportation throughput
      - housing affordability
      - governance capacity
    emergent_properties:
      - superlinear scaling of innovation, GDP, patents (~N^1.15)
      - sublinear scaling of infrastructure (~N^0.85)
      - segregation patterns
      - diversity-dependent cultural production
    failure_modes:
      - infrastructure collapse
      - fiscal crisis
      - segregation and inequality
      - climate vulnerability (heatwaves, flooding, sea-level rise)
      - violence and civil unrest
    canonical_examples:
      - {name: "Tokyo", note: "Largest metropolitan area (~37M); canonical megacity case."}
      - {name: "New York City", note: "Canonical financial-and-cultural global city."}
      - {name: "Lagos", note: "Canonical rapidly-growing African megacity."}
      - {name: "Singapore", note: "Canonical city-state; complete polity at city scale."}

  - slug: market
    name: Market
    priority: P0
    domain: economic
    classes: [market-exchange]
    system_kind: class
    substrate: dispersed transacting agents + price discovery mechanism
    origin: emergent
    boundary_clarity: fuzzy
    primary_function: distributed allocation of goods and services through price-mediated exchange
    lifecycle_stage: maturity
    summary: |
      Venue (physical or virtual) where dispersed participants transact,
      with prices emerging from their aggregate actions. Substrate of
      most modern economic activity; canonical reflexive complex system
      — agents adapt to prices, and their adaptation moves prices.
    boundary:
      type: functional
      description: All buyer-seller pairs trading a defined set of goods or services; boundary is by good, geography, and institutional rules.
    components:
      - buyers (consumers, firms)
      - sellers (firms, individuals)
      - intermediaries (brokers, exchanges)
      - the good or asset being traded
      - rules and contracts
      - price discovery mechanism (auction, bilateral, posted-price)
    interaction_types:
      - buy/sell offers
      - price discovery
      - contract execution
      - information flow (news, signals, rumors)
