# Priority seed list for the catalog.
#
# plan-backlog Tier 0.5 consumes entries top-down, emitting one
# scout-systems task per unfulfilled entry (bounded by the auto-promote
# per-type cap on scout-systems). Entries are "fulfilled" when a
# matching record exists at registry/systems/sys-*--<slug>/ or an
# in-flight task carries `notes: "Priority seed: <slug>. ..."`.
#
# Ordering follows Boulding's Hierarchy of Systems Complexity (see
# taxonomy/source/system-classes.yaml), ascending in abstraction — edit
# order to change scouting priority.
#
# Entry shape:
#   name:    human-readable name. Passed to scout-systems as `topic`.
#   slug:    kebab-case idempotency key (matches registry slug tail).
#   domain:  system-domain taxonomy slug (see
#            taxonomy/source/system-domains.yaml).
#   notes:   optional string — extra scoping context forwarded to scout.

