# Autonomous-run configuration — sweep model.
#
# Read by prompts/autonomous-run.md at the start of each scheduled
# invocation. Edit this file (and commit) to change behavior. Changes
# take effect on the next routine fire.

# Master switch. When `true`, every scheduled invocation exits
# immediately on entry — no preflight, no queue work, no git activity.
# Use it to pause the scheduler during large hand-edits.
disabled: true

# How many tasks one cron tick may emit + execute. Under the sweep
# model each task is a single subject (one system or one metric) and
# runs ~10-60 minutes wall-clock. 1 keeps each tick predictable; raise
# to 2-3 if you want to drain the worklist faster and the scheduler
# fires often enough to amortize context-loading.
#
# Clamped to [1, 10].
max_tasks_per_run: 1

# Per-phase per-iteration soft budget (minutes wall-clock). The
# autorun signals `status: blocked` with reason `budget_exceeded`
# if a task takes longer; the next tick retries on the same subject
# (observations are append-only, so partial work isn't wasted).
#
# matrix-fill is longer because fill-system-metrics produces 50-100
# observations per task in one integrated pass.
budgets:
  system-profiling:    {soft_minutes: 30}
  metric-definition:   {soft_minutes: 30}
  matrix-fill:         {soft_minutes: 60}
  analysis:            {soft_minutes: 60}
