id: sys-000007--microbiome
slug: microbiome
name: Microbiome
aliases:
  - Microbial community
  - Host- or environment-associated microbiota
status: profiled
taxonomy_refs:
  - system-domain:biological
  - system-class:microbiome
summary: >
  Type-level archetype for a multi-taxon microbial community resident in a
  defined niche - host tissue (gut, skin, oral cavity, root rhizosphere) or
  environmental matrix (marine surface water, sediment, deep subsurface,
  built-environment surface) - bounded by the physical and ecological
  interface separating resident microbiota from outside organisms. Members
  are coupled by trophic cross-feeding, syntrophy, competition, phage
  predation, host or niche signaling, and horizontal gene transfer.
boundary:
  type: spatial
  description: >
    The microbiome occupies a delimited niche (a host tissue compartment or
    an environmental matrix) and includes the bacterial, archaeal, fungal,
    and viral populations resident in that niche together with the
    microbe-derived metabolite pools coupling the community to host or
    matrix chemistry. Membership is by residence and ecological engagement
    in the niche; transient passers-through and macro-organisms (host
    tissues, plant roots, animals in environmental matrices) are excluded.
    Distinct from unicellular-organism (single clonal cell life cycle) and
    from multicellular-organism (differentiated cells with shared genome) -
    the defining criterion is multi-taxon co-residence in a niche, not
    cellular co-development.
components:
  - bacterial populations (typically 10^9-10^14 cells per host or per gram of matrix; the dominant taxonomic group in nearly all microbiomes by cell count)
  - archaeal populations (methanogens, ammonia oxidizers, halophiles, ANME consortia)
  - fungal populations (yeasts, filamentous fungi where moisture and substrate permit)
  - viral populations (bacteriophages and eukaryotic viruses; phage-to-bacterium ratios on the order of 1-10)
  - protistan populations (in soil, marine, and rumen microbiomes)
  - microbial metabolite pools (short-chain fatty acids, secondary bile acids, indole derivatives, siderophores, quorum-sensing autoinducers, secondary metabolites)
  - extracellular polymeric matrix and biofilm structural components
  - mobile genetic elements (plasmids, integrative conjugative elements, prophages) carrying horizontally transferred genes
  - taxonomic richness on the order of 10^2 to 10^4 distinct OTUs or ASVs in mature host-associated and soil/aquatic communities
interaction_types:
  - trophic cross-feeding (one taxon's metabolic byproducts feed another)
  - syntrophy (obligately coupled metabolisms, e.g. interspecies hydrogen transfer in methanogenic consortia)
  - competition for substrates and niches
  - bacteriophage predation and lysis
  - host immune and metabolic signaling (in host-associated cases)
  - niche modification (pH, oxygen tension, biofilm matrix construction)
  - horizontal gene transfer (conjugation, transduction, transformation)
  - quorum sensing and chemical communication
scales:
  spatial:
    - cell scale ~10^-6 to 10^-4 m (single bacterial / archaeal / fungal cells, ~1-100 microns)
    - biofilm and microcolony scale ~10^-5 to 10^-3 m
    - microhabitat features ~10^-3 to 10^-1 m (gut crypts, mucus layer, soil aggregates, particulate marine snow)
    - niche or host-organ scale ~10^-1 to 10^0 m (gut lumen, rhizosphere of a root system, surface ocean meter)
    - habitat or biome scale ~10^3 to 10^7 m (soil province, ocean basin) for environmental microbiomes
  temporal:
    - metabolite-pool turnover ~10^2 to 10^4 s (minutes to hours)
    - daily compositional fluctuations driven by host or environmental cycles
    - weeks-to-months community restructuring after perturbation (antibiotics, dietary shift, drought)
    - years-to-decades successional dynamics and host-life-course effects
    - evolutionary co-adaptation across host or matrix lineages over 10^4 to 10^9 yr
source_refs:
  - src-000010--animals-in-a-bacterial-world-a-new-imperative-for-the-life-s
  - src-000011--the-application-of-ecological-theory-toward-an-understanding
canonical_examples:
  - name: Human gut microbiome
    note: Highest-density and best-sequenced host-associated microbiome; lumen plus mucosa-associated bacteria, archaea, fungi, and phages with daily compositional dynamics and decade-scale succession.
  - name: Rhizosphere microbiome
    note: Soil-root interface community shaping plant nutrient uptake and pathogen defense; bacterial, fungal, and protistan members structured by gradients of plant-derived carbon and oxygen.
  - name: Marine surface (epipelagic) microbiome
    note: Open-ocean upper-mixed-layer planktonic community dominated by SAR11, Prochlorococcus, Synechococcus, marine archaea, and viruses; coupled to global biogeochemical cycles via dissolved-organic-matter cycling.
  - name: Oral microbiome
    note: Multi-site biofilm community across teeth, gingiva, tongue, and saliva; canonical example of biofilm-structured host-associated microbiome with site-specific assemblies.
  - name: Skin microbiome
    note: Patchwork of dry, moist, and sebaceous microhabitats with characteristic Cutibacterium, Staphylococcus, and Malassezia communities and strong inter-personal stability.
  - name: Sponge- and coral-associated microbiomes
    note: Densely diverse marine-invertebrate symbiont communities with photosynthetic, nitrogen-fixing, and secondary-metabolite-producing members tightly integrated with host physiology.
  - name: Ruminant rumen microbiome
    note: Anaerobic digestive microbiome of cattle, sheep, and other foregut fermenters; canonical example of host-microbe metabolic integration enabling cellulose digestion via methanogenic syntrophy.
