  - submarine and terrestrial cable infrastructure
  - data centers
  - protocols (IP, TCP, UDP, BGP, DNS, TLS, HTTP/HTTPS, etc.)
created_at: '2026-04-29T22:08:28Z'
dominant_constraints:
  - speed of light (latency floor)
  - bandwidth limits on physical media
  - IPv4 address exhaustion (driving NAT and IPv6)
  - DNS root authority and ICANN governance
emergent_properties:
  - power-law AS topology
  - rich-club connectivity among large transits
  - end-to-end principle (intelligence at edges)
  - resilience to random failures, vulnerability to targeted attacks
failure_modes:
  - BGP route hijacking and leaks
  - DDoS attacks
  - submarine cable cuts
  - DNS infrastructure failures
  - regional fragmentation (splinternet)
id: sys-000023--internet
interaction_types:
  - packet routing (BGP between ASes; OSPF/IS-IS within ASes)
  - DNS name resolution
  - TCP / TLS connection establishment
  - peer / transit / customer business relationships among ASes
  - distributed denial-of-service attacks and defenses
lifecycle_stage: maturity
main_feedbacks:
  - congestion control (TCP's AIMD)
  - BGP route propagation and policy convergence
  - economics of peering and transit driving topology
  - investment responding to traffic growth
name: The Internet
origin: designed
primary_function: planet-scale packet-switched data transport
priority: P0
scales:
