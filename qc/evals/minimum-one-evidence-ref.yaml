name: minimum-one-evidence-ref
description: >
  Every observation must cite at least one evidence entry, and each referenced
  evidence ID must resolve to a row in the relevant source's evidence.jsonl.
  Schema shape already enforces minItems=1 on evidence_refs; this eval adds
  cross-file resolution so dangling references are caught before warehouse
  materialization.
scope: observations
level: error
checks:
  - id: evidence-refs-nonempty
    description: evidence_refs is a non-empty list.
    assertion: "len(obs['evidence_refs']) >= 1"
  - id: evidence-refs-resolve
    description: Every evidence_ref exists in some source's evidence.jsonl.
    assertion: "all(resolve_evidence(ref) is not None for ref in obs['evidence_refs'])"
