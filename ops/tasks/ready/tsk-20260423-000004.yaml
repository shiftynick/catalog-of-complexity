notes: 'Candidate: Caenorhabditis elegans (model multicellular organism). Proposed
  slug: caenorhabditis-elegans. Proposed taxonomy: system-domain:biological, system-class:multicellular-organism.
  Scouted by tsk-20260423-000001. C. elegans is the most fully-characterized multicellular
  organism: invariant cell lineage, complete connectome, fully sequenced genome, short
  (~3 day) life cycle. Scales: cellular (~µm) to organismal (~1 mm); temporal from
  sub-second neural dynamics to days of development. Anchor sources: Brenner S (1974)
  Genetics 77(1):71-94 — founding genetic-tractability paper; White JG, Southgate
  E, Thomson JN, Brenner S (1986) Philos Trans R Soc Lond B 314(1165):1-340 — complete
  neural wiring diagram.'
