notes: 'Candidate: hydrogen atom (1H). Proposed slug: hydrogen-atom. Proposed taxonomy:
  system-domain:physical, system-class:atomic-system. Scouted by tsk-20260423-000013
  (Tier 0.5 priority-seed `atomic-system`, physical domain). Boundary cue: one proton
  nucleus plus one bound electron, governed by the electromagnetic interaction (Coulomb
  attraction) with spin-orbit and QED corrections; the canonical two-body Schrödinger
  problem with analytic bound-state solutions (Rydberg series, Lyman/Balmer/Paschen
  lines). Scales: Bohr radius a0 ≈ 5.29e-11 m (length), Hartree Eh ≈ 27.2 eV (energy),
  atomic time unit ≈ 2.42e-17 s. Preferred over He-4 / Rb-87 / U-238 for the first
  atomic-system profile because its analytic solvability anchors the class cleanly;
  a future scout can add He or a laser-cooled species for correlated/many-body coverage.
  Anchor sources: Bransden B.H. & Joachain C.J. (2003) Physics of Atoms and Molecules
  2nd ed., ISBN 978-0582356924 (chs. 3-4); Griffiths D.J. & Schroeter D.F. (2018)
  Introduction to Quantum Mechanics 3rd ed., ISBN 978-1107189638 (ch. 4); NIST Atomic
  Spectra Database 2024, doi:10.18434/T4W30F (reference data).'
