notes: |
  Taxonomy gap proposal emitted by scout-systems tsk-20260423-000014
  (Priority seed: molecular-system, system-domain:physical). No existing
  system-class slug covers a bound multi-atom physical system: the closest
  existing physical-domain classes (`ocean-circulation-cell`, `river-network`)
  describe macroscale fluid/transport systems, and the pending `atomic-system`
  proposal (tsk-20260423-000016) covers single-nucleus bound systems only.

  Proposed addition to taxonomy/source/system-classes.yaml:

    - slug: molecular-system
      label: Molecular system
      description: >
        Bound assembly of two or more atoms held together by chemical bonds
        (covalent, ionic, metallic, hydrogen, or van der Waals), whose
        stationary states are governed by the coupled electronic and nuclear
        Schrödinger problem (Born–Oppenheimer separation in most practical
        treatments). Spans diatomics (H2, N2), polyatomic small molecules
        (H2O, CO2), and macromolecules (proteins, polymers) when treated as
        a single bound object rather than as a population of species.
        Distinct from `atomic-system` (single nucleus + electrons, no
        bonds), from `chemical-reaction-network` (population-level kinetics
        across many molecular species), and from biological classes like
        `multicellular-organism` (where molecules are components, not the
        system-of-interest).
      references:
        - Atkins, P. & Friedman, R. (2011) Molecular Quantum Mechanics, 5th ed.
          Oxford University Press. ISBN 978-0199541423.
        - McQuarrie, D.A. (2007) Quantum Chemistry, 2nd ed. University Science
          Books. ISBN 978-1891389504.
        - Szabo, A. & Ostlund, N.S. (1996) Modern Quantum Chemistry. Dover.
          ISBN 978-0486691862.

  Policy note: this task edits taxonomy/ (content-gated under AGENTS.md).
  Type `review-records` auto-promotes, so a reviewer may want to hold or
  downgrade priority before merging. The block on tsk-20260423-000014 names
  this task as its unblock dependency. The adjacent atomic-system proposal
  (tsk-20260423-000016) and this one are independent taxonomy additions;
  either can merge first, and the descriptions cross-reference accordingly.
  A follow-on scout for `chemical-reaction-network` (tsk-20260423-000015)
  will likely need a third, separate taxonomy-proposal task.
