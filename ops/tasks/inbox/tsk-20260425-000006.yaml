notes: |
  Cluster of 1 proposal (severity_floor: moderate) against
  schemas/task.schema.json surfaced by apply-retros run
  run-01KQ2E2SJYDEVQT958GEYKY6VM.

  retro-01KQ2DKYEME1BXMBXS0KAZRR3D (moderate): 'Add a third unblock
  kind, `sources-resolved`, that fires when every entry in the task''s
  `source_refs` resolves to a registered `registry/sources/src-*/
  source.yaml`. Update `src/coc/queue.py::_unblock_condition_met` with
  the corresponding check (iterate task.source_refs, dispatch by prefix
  to the matching registry lookup). Add tests covering: all-resolved,
  some-resolved, prefixed-form vs `src-*` form, and tasks with no
  source_refs (vacuously true vs explicit guard).'

  Rationale (verbatim from the source retro): 'Directly closes the
  multi-source loop documented as a known caveat in run-01KQ2DJ1...''s
  SKILL.md edit. Without this, a blocked profile-system task with 3
  missing isbn/doi refs requires up to 3 plan-backlog passes to fully
  unblock — each pass emits acquire-source tasks within the cap of 3,
  the profile re-blocks on the remainder, and so on. With
  sources-resolved, plan-backlog wires the blocked profile''s unblock
  once and the task auto-resumes when the final acquisition lands,
  regardless of order. Severity moderate: the multi-pass workaround
  does converge, so this is a latency/efficiency win rather than a
  correctness fix.'

  Reviewer guidance: this is a schema + queue.py + tests change, not a
  prose-only SKILL.md edit. The schema enum already lists two kinds
  (`taxonomy-slug-exists`, `task-complete`); add `sources-resolved` as
  the third. The new kind needs no new `unblock` subfield — it
  introspects the task's own `source_refs`. After landing, plan-backlog
  Tier 0.75 should switch its blocked-task wiring from
  `kind: task-complete` (one acquire-source task) to
  `kind: sources-resolved` (whole `source_refs` set), eliminating the
  multi-pass convergence loop documented in skills/plan-backlog/SKILL.md.

  Sibling minor proposal not clustered (severity below floor):
  retro-01KQ2DKYEME1BXMBXS0KAZRR3D also proposes a minor-severity
  curation pass to backfill `class_hint` on existing
  config/priority-systems.yaml entries. It remains in the retro file
  for an ad-hoc lower-floor invocation or a future re-emergence.
