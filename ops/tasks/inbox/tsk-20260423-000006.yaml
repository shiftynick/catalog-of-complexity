notes: >-
  Candidate: rhizosphere microbiome — the root-associated microbial
  community surrounding plant roots. Proposed slug: rhizosphere-microbiome.
  Proposed taxonomy: system-domain:biological, system-class:microbiome.
  Scouted by tsk-20260423-000001. Deliberately distinct from the
  human-gut-microbiome candidate (tsk-20260423-000002): different host,
  different selective pressures (root exudate gradients, rhizodeposition,
  spatial soil heterogeneity), and different characteristic scales. A
  profiler should draw the boundary at the millimetre-scale volume of soil
  under direct root influence, not the bulk soil. Scales: µm (microbial
  cell) to mm (rhizosphere thickness) to seasonal (plant life cycle).
  Anchor sources: Philippot L et al. (2013) Nat Rev Microbiol 11(11):789-799
  — review of rhizosphere microbial ecology; Berendsen RL, Pieterse CM,
  Bakker PA (2012) Trends Plant Sci 17(8):478-486 — plant-health
  perspective.
