notes: 'Candidate: Gene regulatory network (type-level archetype). Proposed slug:
  gene-regulatory-network. Proposed taxonomy: system-domain:biological,
  system-class:gene-regulatory-network. Scouted by tsk-20260426-000004 (Tier 0.5
  priority-seed `gene-regulatory-network`, biological domain; class slug landed
  via review-records tsk-20260426-000007). Boundary cue: at the type level, a
  GRN is the within-cell regulatory subgraph realized by one organism`s
  transcription-factor and regulatory-RNA repertoire acting on its own gene
  set - bounded by the nuclear (or nucleoid) compartment and by the regulator
  -> target relation (only edges that change a gene`s expression rate count;
  edges that catalyze a metabolic transformation belong in metabolic-network,
  not here). Distinct from `metabolic-network` (enzyme-catalyzed metabolite
  conversions; edge = catalysis of a chemical transformation), from
  `chemical-reaction-network` (general mass-action / stochastic kinetics
  without gene-specific binding semantics or the regulator-target edge
  structure), and from `unicellular-organism` / `multicellular-organism`
  (whole-cell or whole-organism units). Components: transcription factors
  (sequence-specific DNA-binding proteins; ~5-10% of protein-coding genes
  in most genomes - ~250 in E. coli, ~1500-2000 in human), target genes
  with their cis-regulatory elements (promoters, enhancers, silencers,
  insulators), regulatory non-coding RNAs (microRNAs ~22 nt with
  ~10^2-10^3 species per cell type targeting ~30-60% of mRNAs;
  lncRNAs as scaffolds and decoys), signal-responsive nuclear
  receptors and chromatin-state modifiers, and the chromatin
  accessibility landscape (nucleosome positioning, histone marks,
  DNA methylation) that gates regulator access. Cardinality: ~10^2
  nodes / ~10^3 edges in well-curated bacterial GRNs (RegulonDB E. coli)
  up to ~10^4 nodes / ~10^5-10^6 putative edges in mammalian GRNs
  inferred from ChIP-seq + ATAC-seq + perturbation screens.
  Interaction types: transcriptional activation (TF binding recruits
  RNA polymerase / coactivators), transcriptional repression (TF
  binding blocks RNA polymerase or recruits corepressors / chromatin
  silencers), post-transcriptional regulation (miRNA / RNA-binding
  protein targeting of transcripts), autoregulation (positive and
  negative feedback loops), and recurring network-motif coupling
  (feed-forward loops, single-input modules, multi-input modules,
  bi-fan motifs - documented at statistically significant
  enrichment over randomized graphs in Alon 2019). Dynamics are
  typically modeled as Boolean / random Boolean networks (Kauffman
  1969 - genes on/off, attractors as cell types), continuous ODE
  systems with Hill-function regulation (Alon 2019), or stochastic
  master / Gillespie simulations capturing transcription-burst noise.
  Scales: spatial - TF binding site ~10 bp, nucleosome ~150 bp, gene
  body ~10^3-10^5 bp, topologically associating domain ~10^5-10^6 bp,
  nucleus ~10^-6 m; temporal - TF residence on DNA ~seconds,
  transcription initiation / elongation ~minutes, mRNA half-life
  ~minutes-hours, full regulatory cascade response ~hours,
  developmental fate decisions ~hours-days, GRN rewiring across
  speciation ~10^6-10^9 yr. Canonical examples (>=3) populating
  canonical_examples in the eventual profile: E. coli lac operon
  and its lacI repressor + CAP activator (the textbook prokaryotic
  GRN, demonstrating signal-responsive transcriptional logic with
  catabolite repression); Drosophila early-embryo gap-gene network
  (bicoid maternal gradient -> hunchback / Krüppel / knirps / giant
  gap genes - the canonical developmental GRN with quantitative
  positional information and cross-repression); mammalian p53
  stress-response network (p53 as a master TF activated by DNA damage,
  hypoxia, oncogene activation, regulating ~hundreds of targets
  controlling cell-cycle arrest, DNA repair, apoptosis; the canonical
  metazoan stress-response GRN with extensive negative-feedback
  autoregulation via MDM2). Additional well-known examples that may
  substitute for canonical_examples breadth: Saccharomyces cerevisiae
  cell-cycle GRN (Cdc28 + cyclin / Sic1 / MBF / SBF), sea-urchin
  endomesoderm GRN (Eric Davidson`s reference developmental GRN with
  >50 genes mapped at cis-regulatory resolution), Mycobacterium
  tuberculosis dormancy / DosR regulon, mammalian circadian clock GRN
  (BMAL1/CLOCK -> Per/Cry feedback), and pluripotency core GRN
  (Oct4 / Sox2 / Nanog mutual activation). Anchor sources:
  Davidson, E.H. (2006) The Regulatory Genome - Gene Regulatory
  Networks in Development and Evolution. Academic Press,
  isbn:9780120885633 (the foundational textbook framing GRNs as the
  causal substrate of development and evolution); Alon, U. (2019)
  An Introduction to Systems Biology - Design Principles of
  Biological Circuits, 2nd ed. CRC Press, isbn:9781439837177 (the
  canonical introduction to GRN structure-function via recurring
  network motifs and quantitative dynamics); Kauffman, S.A. (1969)
  Metabolic stability and epigenesis in randomly constructed genetic
  nets. Journal of Theoretical Biology 22(3):437-467,
  doi:10.1016/0022-5193(69)90015-0 (the founding Boolean-network
  model of GRNs and the attractor-as-cell-type hypothesis). Future
  scouts may add specific habitat- or organism-context entries
  (developmental GRN as a separate type-level if a clean
  developmental-vs-homeostatic split warrants it) only if the
  inclusion criterion in AGENTS.md is satisfied; instance-level
  entries belong in canonical_examples, not as separate registry
  entries.'
