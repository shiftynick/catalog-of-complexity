notes: 'Candidate: Microbiome (type-level archetype). Proposed slug: microbiome.
  Proposed taxonomy: system-domain:biological, system-class:microbiome. Scouted
  by tsk-20260426-000002 (Tier 0.5 priority-seed `microbiome`, biological
  domain, class_hint=microbiome resolves in
  taxonomy/source/system-classes.yaml). Boundary cue: at the type level, a
  microbiome is the multi-taxon microbial community resident in a defined
  niche - host tissue (gut, skin, oral cavity, root rhizosphere) or
  environmental matrix (marine surface water, sediment, deep subsurface,
  built-environment surface) - bounded by the physical/ecological interface
  separating resident microbiota from outside organisms. Distinct from
  `unicellular-organism` (single-clonal-cell life cycle) and
  `multicellular-organism` (differentiated cells with shared genome).
  Components: bacterial populations (the dominant taxonomic group in nearly
  all microbiomes by cell count, ~10^9-10^14 cells per host or per gram of
  matrix), archaeal populations (methanogens, ammonia oxidizers, halophiles),
  fungal populations (yeasts, filamentous fungi where moisture permits),
  viral populations (bacteriophages and eukaryotic viruses; phage-to-bacterium
  ratios ~1-10), and the microbial metabolite pools (short-chain fatty acids,
  secondary bile acids, indole derivatives, siderophores, quorum-sensing
  autoinducers) coupling the community to host or matrix chemistry. Cardinality
  spans 10^2-10^4 distinct OTUs / ASVs in mature host-associated and
  soil/aquatic communities. Interaction types: trophic cross-feeding (one
  taxon`s metabolic byproducts feed another), syntrophy (obligately coupled
  metabolisms, e.g. interspecies hydrogen transfer in methanogenic
  consortia), competition for substrates and niches, bacteriophage predation,
  host immune and metabolic signaling (in host-associated cases), niche
  modification (pH, oxygen tension, biofilm matrix construction), and
  horizontal gene transfer (conjugation, transduction, transformation).
  Scales: spatial - cell-scale ~1-100 microns, biofilm/microcolony scale
  ~10^-5 to 10^-3 m, microhabitat features ~10^-3 to 10^-1 m (crypts, mucus
  layer, soil aggregates, particulate marine snow), niche/host-organ scale
  ~10^-1 to 10^0 m (gut lumen, root system, surface ocean meter); temporal -
  metabolite-pool turnover ~minutes to hours, daily compositional
  fluctuations driven by host or environmental cycles, weeks-to-months
  community restructuring after perturbation (antibiotics, dietary shift,
  drought), years-to-decades successional dynamics and host-life-course
  effects. Canonical examples (>=3) populating canonical_examples in the
  eventual profile: human gut microbiome (the highest-density, best-sequenced
  host-associated microbiome; lumen + mucosa-associated bacteria, archaea,
  fungi, phages with daily compositional dynamics and decade-scale succession);
  rhizosphere microbiome (the soil-root interface community shaping plant
  nutrient uptake and pathogen defense; bacterial + fungal + protistan with
  strong gradient in plant-derived carbon and oxygen); marine surface
  (epipelagic) microbiome (open-ocean upper-mixed-layer planktonic community
  dominated by SAR11, Prochlorococcus, Synechococcus, archaea, and viruses;
  coupled to global biogeochemical cycles via dissolved-organic-matter
  cycling). Additional well-known examples that may substitute for
  canonical_examples breadth: oral microbiome, skin microbiome, sponge- /
  coral-associated microbiomes, deep-subsurface sediment microbiome,
  ruminant rumen microbiome. Anchor sources: McFall-Ngai, M. et al. (2013)
  "Animals in a bacterial world, a new imperative for the life sciences"
  Proc. Natl. Acad. Sci. USA 110(9):3229-3236, doi:10.1073/pnas.1218525110
  (the manifesto establishing microbiome as a unifying biological concept
  across hosts and environments); Costello, E.K., Stagaman, K., Dethlefsen,
  L., Bohannan, B.J.M., Relman, D.A. (2012) "The Application of Ecological
  Theory Toward an Understanding of the Human Microbiome" Science
  336(6086):1255-1262, doi:10.1126/science.1224203 (foundational ecological
  framing of microbiomes as communities subject to assembly, succession, and
  resilience dynamics shared with macro-ecological communities). Future
  scouts can add specific habitat- or host-context entries (rhizosphere as
  separate type-level if specialized enough, marine vs. soil microbiome
  splits) only if the inclusion criterion in AGENTS.md is satisfied;
  instance-level entries belong in canonical_examples, not as separate
  registry entries. Note: existing registry/systems/ entries
  sys-000002--human-gut-microbiome and sys-000006--rhizosphere-microbiome are
  status: deprecated (instance-level under the type-vs-instance correction);
  this type-level `microbiome` entry supersedes them at the catalog level
  while their slugs remain reserved for canonical_examples references.'
