notes: |
  Cluster of 6 proposals against skills/plan-backlog/SKILL.md surfaced by
  apply-retros run run-01KQ1AQPVFVD22VG1R9V4NS8SX. Two converging themes:

  Theme A — Tier 0.75 must scan blocked/ for source debt (and emit
  acquire-source tasks with --unblock-on-task wiring back to blocked
  profile-system tasks):
    - retro-01KPZSPPPGR03ZZ9H0XSZFYPHF (moderate): 'Explicitly state that
      Tier 0.75 (acquire-source seeding) should scan ops/tasks/blocked/ for
      profile-system tasks with unregistered prefixed source_refs, and emit
      one acquire-source task per distinct external identifier
      (doi/isbn/arxiv/url). Reference --unblock-on-task so the blocked
      profile-system task can be wired to auto-resume once the final
      acquire-source task completes.'
    - retro-01KPZX4T48DMS9B65PDQ2PEHHY (moderate): 'Expand Tier 0.75 scan
      set from {inbox,ready,leased,running}/ to include blocked/, and
      adopt the prior retro proposal to emit acquire-source tasks with
      --unblock-on-task wiring so blocked profile-system tasks auto-resume
      once their source debt clears.'
    - retro-01KQ00J0W2EQ8D9CDYBNS6MGCQ (moderate): 'Tier 0.75 must scan
      blocked/ in addition to {inbox,ready,leased,running}/ for
      unregistered prefixed source_refs, emit acquire-source tasks with
      --unblock-on-task pointers back to the blocked profile-system task
      ids; manifests should expose the isbn:/doi: -> src-* mapping at a
      glance.'
    - retro-01KQ01AARG44F23JNC6W9NZB40 (moderate): 'Broaden Tier 0.75
      source-debt scanning to include ops/tasks/blocked/ when ready/ is
      empty, or add a pre-Tier-0.5 check that emits acquire-source tasks
      for blocked prefixed source_refs before seeding new scouts.'

  Theme B — pre-scout taxonomy-slug verification at backlog-planning time
  to avoid serial scout blocks on missing slugs:
    - retro-01KPXX72HWVGHMXK8H3Z9CYEVT (moderate): 'When seeding multiple
      scout-systems tasks from priority-systems.yaml whose candidate
      class-slugs are not yet in taxonomy/source/system-classes.yaml, emit
      the review-records taxonomy-proposal tasks alongside the scout tasks
      in the same backlog pass, instead of relying on each scout to block
      and emit its own.'
    - retro-01KPXXM53WJH3KF8Y4NZ17HCGA (major): 'Before emitting a
      scout-systems task for a priority-systems.yaml entry, verify the
      candidate class slug resolves against
      taxonomy/source/system-classes.yaml. If it does not, emit the
      review-records taxonomy-proposal task alongside (or instead of) the
      scout task, and mark the scout task as blocked-pending the
      review-records id so coc advance or a dependency check can gate it.'

  Reviewer guidance: Theme A and Theme B are independent edits to the
  same SKILL.md and can land in one commit. Theme A is the higher-impact
