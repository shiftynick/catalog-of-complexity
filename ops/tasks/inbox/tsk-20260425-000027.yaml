  on tsk-20260425-000011, acquire-source blocked\nnot-found on doi:10.18434/T4W30F).
  The current src/coc/sources/\ndispatch.py routes `doi:` exclusively to Crossref;
  the NIST DOI\nnamespace 10.18434/* is registered with DataCite, as are most\nZenodo
  (10.5281/*), figshare (10.6084/*), and dataset-publisher\nDOIs. Without a DataCite
  fallback, every reference to a NIST\nstandard reference database, a Zenodo dataset,
  or similar dataset\nDOI produces a blocked acquire-source task with no auto-\nremediation
  path. Pattern recommended in the retro: add\nsrc/coc/sources/datacite.py mirroring
  crossref.py's shape (fetch\nhttps://api.datacite.org/dois/<doi>, map JSON:API to\nResolvedSource,
  write metadata.json to raw/), then have\ndispatch.resolve try Crossref first and
  fall back to DataCite on\n404. DataCite's API is unauthenticated and returns full
  records.\nBlocking task downstream: tsk-20260425-000011 (and through it,\ntsk-20260423-000019
  profile-system hydrogen atom)."
