notes: "Taxonomy gap proposal emitted by scout-systems tsk-20260423-000013\n\
  (Priority seed: atomic-system, system-domain:physical). No existing\n\
  system-class slug covers an atom-scale physical system: the closest\n\
  existing physical-domain classes (`ocean-circulation-cell`, `river-network`)\n\
  describe macroscale fluid/transport systems, not bound few-body\n\
  electromagnetic systems.\n\n\
  Proposed addition to taxonomy/source/system-classes.yaml:\n\n\
  - slug: atomic-system\n\
    label: Atomic system\n\
    description: >\n\
      Bound system of one nucleus and its electrons (neutral atom or\n\
      atomic ion), whose stationary states and transitions are governed\n\
      by the electromagnetic interaction plus spin-orbit and relativistic\n\
      corrections. The canonical unit of the periodic table and the\n\
      smallest system exhibiting discrete quantum energy levels that\n\
      realize chemical identity. Distinct from `molecular-system`\n\
      (nuclei bonded into a multi-atom structure) and from\n\
      `chemical-reaction-network` (population-level kinetics across many\n\
      molecular species).\n    references:\n\
      - Bransden, B.H. & Joachain, C.J. (2003) Physics of Atoms and\n\
        Molecules, 2nd ed. Pearson. ISBN 978-0582356924.\n\
      - Foot, C.J. (2005) Atomic Physics. Oxford University Press.\n\
        ISBN 978-0198506966.\n\
      - NIST Atomic Spectra Database (2024). DOI 10.18434/T4W30F.\n\n\
  Policy note: this task edits taxonomy/ (content-gated under AGENTS.md).\n\
  Type `review-records` auto-promotes, so a reviewer may want to hold or\n\
  downgrade priority before merging. The block on tsk-20260423-000013\n\
  names this task as its unblock dependency. Severity moderate — one\n\
  priority-seed scout is currently blocked; follow-on molecular-system\n\
  and chemical-reaction-network scouts will hit the same gap."
