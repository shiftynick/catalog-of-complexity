notes: 'Candidate: Escherichia coli K-12 MG1655 (whole prokaryotic cell).
  Proposed slug: escherichia-coli-k12-mg1655. Proposed taxonomy:
  system-domain:biological, system-class:unicellular-organism. Scouted by
  tsk-20260424-000004 (Tier 0.5 priority-seed `prokaryotic-cell`, biological
  domain). Boundary cue: a single rod-shaped Gram-negative bacterial cell
  bounded by the outer membrane (lipopolysaccharide outer leaflet, porins,
  Lpp/Pal anchors), the periplasm (peptidoglycan layer plus periplasmic
  proteins), and the inner cytoplasmic membrane; substrate uptake, ion
  fluxes, and secretion are boundary exchanges. Components: ~4.6 Mbp
  circular chromosome encoding ~4300 protein-coding genes (Blattner et al.
  1997 doi:10.1126/science.277.5331.1453; Hayashi et al. 2006
  doi:10.1038/msb4100049); the ribosome population (~10^4-10^5 70S
  ribosomes per cell at fast growth, Bremer & Dennis 2008), RNA and DNA
  polymerases, the metabolite pool (~10^9 small molecules per cell), the
  ~1900-metabolite/~2700-reaction iML1515 metabolic network (Monk et al.
  2017 doi:10.1038/nbt.3956 — overlaps the
  `escherichia-coli-k12-metabolic-network` entity scouted by
  tsk-20260424-000003), nucleoid-associated proteins (HU, H-NS, Fis),
  the FtsZ/MreB cytoskeletal machinery, two-component signaling systems
  (~30 sensor kinases), and ~80 sigma-factor- and TF-controlled regulons.
  Interaction types: enzyme-catalyzed metabolism (mass-action /
  Michaelis-Menten), transcription and translation, sigma-factor /
  transcription-factor regulation, two-component phosphorelay signaling,
  DNA replication and segregation, cell-wall remodeling and septation,
  membrane transport (active and passive), and (in non-axenic conditions)
  conjugation, transduction, and quorum sensing. Scales: spatial — single
  cell ~1-2 micron rod length, ~0.5 micron diameter, ~1 fL cytoplasmic
  volume, ~25-50 nm peptidoglycan thickness; temporal — catalytic
  turnover ~10^-3 to 10^-1 s, transcription ~10^1-10^2 s per gene,
  doubling ~20 min on rich medium to ~hours on minimal medium,
  evolutionary mutation rate ~10^-10 per base per generation.
  Population/genomic — Boulding hierarchy level 4 ("open systems /
  cell"), the canonical reference prokaryote with the deepest experimental
  and modeling literature of any organism. Preferred over Bacillus
  subtilis 168 (the canonical Gram-positive complement; deferred as a
  separate scout once E. coli is profiled to anchor the Gram-negative side
  first), Mycoplasma genitalium G37 (minimal-cell anchor; deferred —
  thinner literature on cell-level dynamics outside the WholeCell modeling
  thread), and the previously-scouted
  `escherichia-coli-k12-metabolic-network` entry (different scale:
  intracellular biochemical reaction graph, not the whole cell; both
  entries should coexist with explicit cross-references). Anchor sources:
  Blattner, F.R., Plunkett, G. III, Bloch, C.A., Perna, N.T., Burland, V.,
  Riley, M., et al. (1997) "The complete genome sequence of Escherichia
  coli K-12" Science 277(5331):1453-1462, doi:10.1126/science.277.5331.1453
  (the reference genome paper); Neidhardt, F.C. (Editor-in-Chief) (1996)
  Escherichia coli and Salmonella: Cellular and Molecular Biology, 2nd
  ed., ASM Press, isbn:9781555810849 (the canonical two-volume cell
  biology compendium); Hayashi, K., Morooka, N., Yamamoto, Y., Fujita, K.,
  Isono, K., Choi, S., et al. (2006) "Highly accurate genome sequences of
  Escherichia coli K-12 strains MG1655 and W3110" Mol. Syst. Biol.
  2:2006.0007, doi:10.1038/msb4100049 (the MG1655-specific resequence
  that is the operational reference for this strain). The
  `system-class:unicellular-organism` entry already cites Madigan et al.
  (2021) Brock Biology of Microorganisms, isbn:9780134874401 — that
  textbook is the broader-context anchor for the class itself and need
  not be re-cited here unless used for a specific component or scale.'
