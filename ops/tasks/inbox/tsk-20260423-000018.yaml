notes: |
  Taxonomy gap proposal emitted by scout-systems tsk-20260423-000015
  (Priority seed: chemical-reaction-network, system-domain:physical). No
  existing system-class slug covers population-level chemical kinetics: the
  closest existing physical-domain classes describe macroscale transport
  (`ocean-circulation-cell`, `river-network`); the pending `atomic-system`
  proposal (tsk-20260423-000016) covers single-nucleus bound systems and the
  pending `molecular-system` proposal (tsk-20260423-000017) covers single
  bound multi-atom objects. `metabolic-network` is biological-domain and
  scoped to enzyme-catalyzed intracellular graphs. None cover the abstract
  reaction-kinetics object.

  Proposed addition to taxonomy/source/system-classes.yaml:

    - slug: chemical-reaction-network
      label: Chemical reaction network
      description: >
        Population-level system of chemical species coupled by elementary
        reactions, described by a stoichiometric matrix and a rate law
        (mass-action, Michaelis–Menten, or other). Dynamics are typically
        modeled as ODEs (deterministic limit) or continuous-time Markov
        chains (stochastic limit, chemical master equation / Gillespie).
        Canonical examples: the Belousov–Zhabotinsky oscillator, the
        Brusselator, combustion kinetics, atmospheric photochemistry, and
        in-silico CRN models of gene regulation. Distinct from
        `atomic-system` (single nucleus + electrons), from
        `molecular-system` (a single bound multi-atom object treated as the
        system-of-interest), and from `metabolic-network` (intracellular,
        enzyme-catalyzed biochemical graph — a biological-domain special
        case of a CRN with additional cellular context).
      references:
        - Érdi, P. & Tóth, J. (1989) Mathematical Models of Chemical Reactions.
          Princeton University Press / Manchester University Press.
          ISBN 978-0691085326.
        - Feinberg, M. (2019) Foundations of Chemical Reaction Network Theory.
          Springer Applied Mathematical Sciences vol. 202.
          ISBN 978-3030038571.
        - Gillespie, D.T. (1977) Exact stochastic simulation of coupled
          chemical reactions. Journal of Physical Chemistry 81(25):2340-2361.
          doi:10.1021/j100540a008.

  Policy note: this task edits taxonomy/ (content-gated under AGENTS.md).
  Type `review-records` auto-promotes, so a reviewer may want to hold or
  downgrade priority before merging. The block on tsk-20260423-000015 names
  this task as its unblock dependency. The adjacent atomic-system
  (tsk-20260423-000016) and molecular-system (tsk-20260423-000017) proposals
  are independent taxonomy additions; any subset can merge first, and the
  descriptions cross-reference accordingly. With this proposal, all three
  Tier-0.5 priority-seed taxonomy gaps in the physical domain
  (atomic / molecular / CRN) are now captured as review-records tasks.
