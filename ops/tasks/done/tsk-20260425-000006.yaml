notes: "Cluster of 1 proposal (severity_floor: moderate) against\nschemas/task.schema.json
  surfaced by apply-retros run\nrun-01KQ2E2SJYDEVQT958GEYKY6VM.\n\nretro-01KQ2DKYEME1BXMBXS0KAZRR3D
  (moderate): 'Add a third unblock\nkind, `sources-resolved`, that fires when every
  entry in the task''s\n`source_refs` resolves to a registered `registry/sources/src-*/\n\
  source.yaml`. Update `src/coc/queue.py::_unblock_condition_met` with\nthe corresponding
  check (iterate task.source_refs, dispatch by prefix\nto the matching registry lookup).
  Add tests covering: all-resolved,\nsome-resolved, prefixed-form vs `src-*` form,
  and tasks with no\nsource_refs (vacuously true vs explicit guard).'\n\nRationale
  (verbatim from the source retro): 'Directly closes the\nmulti-source loop documented
  as a known caveat in run-01KQ2DJ1...''s\nSKILL.md edit. Without this, a blocked
  profile-system task with 3\nmissing isbn/doi refs requires up to 3 plan-backlog
  passes to fully\nunblock — each pass emits acquire-source tasks within the cap of
  3,\nthe profile re-blocks on the remainder, and so on. With\nsources-resolved, plan-backlog
  wires the blocked profile''s unblock\nonce and the task auto-resumes when the final
  acquisition lands,\nregardless of order. Severity moderate: the multi-pass workaround\n\
  does converge, so this is a latency/efficiency win rather than a\ncorrectness fix.'\n\
  \nReviewer guidance: this is a schema + queue.py + tests change, not a\nprose-only
  SKILL.md edit. The schema enum already lists two kinds\n(`taxonomy-slug-exists`,
  `task-complete`); add `sources-resolved` as\nthe third. The new kind needs no new
  `unblock` subfield — it\nintrospects the task's own `source_refs`. After landing,
  plan-backlog\nTier 0.75 should switch its blocked-task wiring from\n`kind: task-complete`
  (one acquire-source task) to\n`kind: sources-resolved` (whole `source_refs` set),
  eliminating the\nmulti-pass convergence loop documented in skills/plan-backlog/SKILL.md.\n\
  \nSibling minor proposal not clustered (severity below floor):\nretro-01KQ2DKYEME1BXMBXS0KAZRR3D
  also proposes a minor-severity\ncuration pass to backfill `class_hint` on existing\n\
  config/priority-systems.yaml entries. It remains in the retro file\nfor an ad-hoc
  lower-floor invocation or a future re-emergence.\n"
