acceptance_tests:
  - 'tests/test_sources.py::test_dispatch_rejects_isbn_for_now is removed (the invariant
    it asserted no longer holds — dispatch now routes isbn: to isbn_books.resolve).'
  - A new tests/test_sources.py::test_isbn_books_resolve_happy_path test feeds a
    fake fetcher with a Google Books volumes response (one item, populated 
    volumeInfo with title, authors, publishedDate, publisher) and asserts the 
    returned ResolvedSource has kind=book, license=null, url=urn:isbn:<isbn>, 
    exactly one ResolvedArtifact named metadata.json, slug derived from the 
    title, and authors/year as expected.
  - 'A new tests/test_sources.py::test_isbn_books_falls_back_to_open_library test
    feeds a fake fetcher where Google Books returns {"kind": "books#volumes", "totalItems":
    0} (no items) and Open Library returns a populated ISBN:<isbn> entry; asserts
    the metadata.json artifact carries the Open Library response body and the ResolvedSource
    fields are sourced from the Open Library entry.'
  - A new tests/test_sources.py::test_isbn_books_not_found_when_both_empty test 
    asserts NotFoundError is raised when both Google Books returns no items and 
    Open Library returns an empty payload.
  - '`uv run pytest tests/test_sources.py` exits 0.'
