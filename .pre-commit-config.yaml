repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(registry/|ops/|releases/|taxonomy/)
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: coc-validate
        name: coc validate
        entry: uv run coc validate
        language: system
        pass_filenames: false
        files: ^(registry/|taxonomy/|schemas/|ops/tasks/).*\.(ya?ml|jsonl?)$
